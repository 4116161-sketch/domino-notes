<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff0000; --neon: #39ff14; --dark: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            background-image: url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(0, 0, 0, 0.9); border-bottom: 2px solid var(--neon); z-index: 100; }
        .logo-text { color: var(--neon); font-size: 1.3rem; font-weight: 900; text-shadow: 0 0 10px var(--neon); }

        .timer-wrapper { display: flex; align-items: center; gap: 8px; background: rgba(57, 255, 20, 0.1); padding: 5px 15px; border-radius: 50px; cursor: pointer; border: 1.5px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        #game-timer { font-family: monospace; font-size: 1.4rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .paused .timer-wrapper { animation: pulse 1s infinite; border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:last-child { grid-column: 1 / span 2; width: 85%; margin: 0 auto; }
        .card { background: rgba(0, 0, 0, 0.85); border-radius: 25px; border: 2.5px solid var(--neon); padding: 15px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
        
        .player-input { background: none; border: none; color: var(--neon); text-align: center; width: 100%; font-weight: 900; font-size: 1.2rem; outline: none; }
        .score-total { font-size: 4rem; font-weight: 900; color: var(--neon); cursor: pointer; line-height: 1; text-shadow: 0 0 15px var(--neon); }
        .rem-pts { color: #fff; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; font-weight: bold; }

        .history-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; border-top: 1px solid rgba(57,255,20,0.3); padding-top: 8px; margin-top: 5px; }
        .history-item { background: var(--neon); color: #000; padding: 3px 8px; border-radius: 8px; font-size: 0.85rem; font-weight: 900; display: flex; align-items: center; gap: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .modal-box { background: #000; width: 100%; max-width: 400px; padding: 30px; border-radius: 35px; border: 2px solid var(--neon); text-align: center; }

        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        .btn-neon { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-red { background: var(--red); color: #fff; box-shadow: 0 0 15px var(--red); }

        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .theme-item { height: 80px; border-radius: 10px; background-size: cover; background-position: center; border: 1px solid #444; cursor: pointer; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="openSettings()" style="font-size:1.8rem; cursor:pointer; color:var(--neon);">⚙️</div>
        <div class="timer-wrapper" id="timer-container" onclick="toggleTimer()">
            <span id="timer-icon" style="color:white;">⏸️</span>
            <span id="game-timer">00:00</span>
        </div>
        <div class="logo-text">AWEZA PC</div>
    </div>

    <div style="display:flex; justify-content:center; gap:12px; padding:15px;">
        <button onclick="setMode(2)" style="background:var(--neon); color:#000; border:none; padding:8px 25px; border-radius:12px; font-weight:900;">٢ نەفەری</button>
        <button onclick="setMode(3)" style="background:rgba(57, 255, 20, 0.1); color:var(--neon); border:1px solid var(--neon); padding:8px 25px; border-radius:12px; font-weight:900;">٣ نەفەری</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--neon);">تۆمارکردن</h2>
            <input type="number" id="points-input" style="width:100%; font-size:4.5rem; background:none; border:none; border-bottom:4px solid var(--neon); color:var(--neon); text-align:center; outline:none; margin:20px 0;" placeholder="0" inputmode="numeric">
            
            <div id="confirm-box" style="display:none; margin-bottom:20px;">
                <p style="color:var(--red); font-weight:bold; font-size:1.2rem;">⚠️ ئەم خاڵە زۆرە، ئایا دڵنیایت؟</p>
                <div style="display:flex; gap:12px; margin-top:15px;">
                    <button class="btn btn-neon" onclick="saveScore()">بەڵێ</button>
                    <button class="btn btn-red" onclick="closeModal()">نەخێر</button>
                </div>
            </div>

            <div id="normal-btns" style="display:flex; gap:12px;">
                <button class="btn btn-red" onclick="closeModal()">لابردن</button>
                <button class="btn btn-neon" onclick="validateScore()">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <div id="illegal-modal" class="modal">
        <div class="modal-box" style="border-color: var(--red); animation: shake 0.4s ease-in-out;">
            <h1 style="font-size: 5rem;">⛔</h1>
            <h2 style="color:var(--red); font-size: 2.2rem;">نایاساییە!</h2>
            <p style="margin-top:10px;">تۆمارکردنی ١٠١ و سەرووتر قەدەغەیە.</p>
            <button class="btn btn-red" onclick="document.getElementById('illegal-modal').style.display='none'">تێگەیشتم</button>
        </div>
    </div>

    <div id="settings-panel" class="modal" style="justify-content: flex-start;">
        <div class="modal-box">
            <h2 style="color:var(--neon); margin-bottom:15px;">ڕێکخستنی ئاوێزە</h2>
            <p style="text-align:right; font-size:0.9rem;">🎨 باکگراوندەکان:</p>
            <div class="theme-grid">
                <div class="theme-item" style="background-image:url('https://blog.tmlirp.org/hs-fs/hubfs/abstract%20dominoes%20background.jpeg?width=900')" onclick="changeTheme(this.style.backgroundImage)"></div>
                <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1769029174092-d26bc1a51efc?fm=jpg&q=60&w=3000')" onclick="changeTheme(this.style.backgroundImage)"></div>
                <div class="theme-item" style="background-image:url('https://img.goodfon.com/wallpaper/big/6/2c/domino-makro-igra.webp')" onclick="changeTheme(this.style.backgroundImage)"></div>
                <div class="theme-item" style="background-image:url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg')" onclick="changeTheme(this.style.backgroundImage)"></div>
            </div>
            <div style="margin-top:20px;">
                <a href="https://www.facebook.com/4116161-sketch" target="_blank" style="color:var(--neon); display:block; margin-bottom:10px; text-decoration:none;">🔵 Facebook</a>
                <a href="https://www.tiktok.com/@4116161-sketch" target="_blank" style="color:var(--neon); display:block; text-decoration:none;">⚫ TikTok</a>
            </div>
            <button class="btn btn-red" onclick="closeSettings()">گەڕانەوە</button>
        </div>
    </div>

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    let m = Math.floor(seconds / 60); let s = seconds % 60;
                    document.getElementById('game-timer').innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+
