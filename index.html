<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000 url('https://images.unsplash.com/photo-1551024709-8f23befc6f87?q=80&w=1000&auto=format&fit=crop') no-repeat center center;
            background-size: cover; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ١. شاشەی سەرەتا (Splash Screen) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfdfd url('https://www.transparenttextures.com/patterns/lined-paper.png');
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .pencil-img { width: 150px; margin-bottom: 20px; animation: write 1.5s infinite; }
        .splash-text { color: #333; font-size: 2.5rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        @keyframes write { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(-10deg) translateX(-10px); } }

        /* مێنۆ و کارتەکان */
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.7); align-items: center; border-bottom: 1px solid rgba(239,191,59,0.3); }
        .goal-input { background: #111; border: 1px solid #efbf3b; color: #efbf3b; width: 60px; text-align: center; border-radius: 5px; font-weight: bold; padding: 2px; }

        .game-grid { display: flex; gap: 8px; flex: 1; padding: 10px; overflow-x: auto; align-items: flex-start; }
        .card { 
            min-width: 150px; flex: 1; background: rgba(0,0,0,0.6); border-radius: 20px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }
        .card-header { background: rgba(255,255,255,0.05); padding: 12px; text-align: center; border-radius: 20px 20px 0 0; }
        .p-name-input { background: transparent; border: none; color: #efbf3b; font-weight: bold; text-align: center; width: 100%; font-size: 1rem; outline: none; }

        .score-total { font-size: 2.8rem; font-weight: 900; text-align: center; margin: 10px 0; color: #fff; }
        .limit-small { font-size: 0.8rem; color: #888; }

        .history-list { height: 200px; overflow-y: auto; padding: 5px; border-top: 1px solid rgba(255,255,255,0.1); }
        .hist-item { 
            display: flex; justify-content: space-between; padding: 6px 12px; 
            background: rgba(255,255,255,0.03); margin-bottom: 3px; border-radius: 8px; font-size: 0.9rem;
        }
        .btn-del { color: #ff5252; font-weight: bold; cursor: pointer; padding: 0 5px; }

        /* پۆپ-ئەپ */
        #score-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center;
        }
        .modal-box { 
            background: #111; width: 85%; padding: 30px; border-radius: 25px; 
            text-align: center; border: 2px solid #efbf3b;
        }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 3px solid #efbf3b; color: #fff; font-size: 4rem; text-align: center; outline: none; margin: 20px 0; }
        .modal-btns { display: flex; gap: 15px; }
        .modal-btns button { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; }

        .footer { padding: 20px; display: flex; justify-content: space-around; align-items: center; }
        .restart { background: #ff5252; color: #fff; border: none; padding: 12px 30px; border-radius: 15px; font-weight: bold; }
        .mode-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; }
        .active-mode { background: #efbf3b; color: #000; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-text">📝</div>
        <div class="splash-text">خاڵژمێری دۆمینە</div>
        <div style="color:#888; margin-top:10px;">بەخێربێیت...</div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/07/The-Old-Tower-Guild.mp3" type="audio/mpeg">
    </audio>

    <div class="top-nav">
        <div onclick="toggleMusic()" style="cursor:pointer">🎵 میوزیک</div>
        <div>ئامانج: <input type="number" id="goal-val" class="goal-input" value="101" onchange="updateGoal()"></div>
        <div id="mode-controls">
            <button class="mode-btn active-mode" id="btn-2" onclick="setMode(2)">٢ نەفەری</button>
            <button class="mode-btn" id="btn-3" onclick="setMode(3)">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal">
        <div class="modal-box">
            <h2 id="modal-title">ناو</h2>
            <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            <div class="modal-btns">
                <button onclick="closeModal()" style="background:#333; color:#fff;">پاشگەزبوونەوە</button>
                <button onclick="addScore()" style="background:#efbf3b; color:#000;">تەواو OK</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div style="font-size:1.8rem;">🕒</div>
        <button class="restart" onclick="confirmReset()">دەستپێکردنەوە</button>
        <button style="background:#fff; color:#000; border:none; padding:8px 20px; border-radius:10px; font-weight:bold;">ئاوێزە PC</button>
    </div>

    <script>
        // ٣. چالاککردنی شاشەی سەرەتا بۆ ٢ چرکە
        window.onload = function() {
            setTimeout(function() {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2000);
        };

        let curT = 0; let goal = 101;
        let players = { 1: { name: 'تیمی ١', s: 0, h: [] }, 2: { name: 'تیمی ٢', s: 0, h: [] } };

        function setMode(n) {
            players = {};
            for(let i=1; i<=n; i++) { players[i] = { name: 'تیمی ' + i, s: 0, h: [] }; }
            document.getElementById('btn-2').className = (n==2) ? 'mode-btn active-mode' : 'mode-btn';
            document.getElementById('btn-3').className = (n==3) ? 'mode-btn active-mode' : 'mode-btn';
            renderAll();
        }

        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" 
                                   onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <div style="font-size:1.8rem; cursor:pointer; margin-top:5px; color:#efbf3b" onclick="openModal(${i})">+</div>
                        </div>
                        <div class="score-total">${players[i].s} <span class="limit-small">/${goal}</span></div>
                        <div class="history-list">
                            ${players[i].h.map((val, idx) => `
                                <div class="hist-item">
                                    <span style="color:#666">${idx + 1}</span>
                                    <span>${val}</span>
                                    <span class="btn-del" onclick="delScore(${i}, ${idx})">×</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
        }

        function openModal(t) {
            curT = t;
            document.getElementById('modal-title').innerText = players[t].name;
            document.getElementById('points-input').value = "";
            document.getElementById('score-modal').style.display = 'flex';
            document.getElementById('points-input').focus();
        }

        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }

        function addScore() {
            let val = parseInt(document.getElementById('points-input').value);
            if (!isNaN(val) && val !== 0) {
                players[curT].s += val;
                players[curT].h.push(val);
                renderAll();
                if(players[curT].s >= goal) { alert("🏆 پیرۆزە! " + players[curT].name + " بردییەوە"); }
            }
            closeModal();
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }
        function toggleMusic() { let m = document.getElementById('bg-music'); if (m.paused) m.play(); else m.pause(); }
        function confirmReset() { if(confirm("دڵنیای لە دەستپێکردنەوە؟")) location.reload(); }

        setMode(2);
        document.body.addEventListener('click', () => { document.getElementById('bg-music').play(); }, {once: true});
    </script>
</body>
</html>
