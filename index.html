<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff4444; --green: #00ff88; --dark: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            background-image: url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--dark); font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px; background: rgba(239, 191, 59, 0.95); 
            border-bottom: 3px solid var(--dark); z-index: 100;
        }

        .timer-wrapper { display: flex; align-items: center; gap: 8px; background: var(--dark); padding: 5px 15px; border-radius: 50px; cursor: pointer; }
        #game-timer { font-family: monospace; font-size: 1.4rem; font-weight: 900; color: var(--green); }
        .paused .timer-wrapper { animation: pulse 1.5s infinite; border: 1px solid var(--red); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .card { background: rgba(255, 255, 255, 0.25); border-radius: 25px; border: 2.5px solid var(--dark); padding: 15px; text-align: center; backdrop-filter: blur(15px); }
        .player-input { background: none; border: none; color: var(--dark); text-align: center; width: 100%; font-weight: 900; font-size: 1.2rem; outline: none; }
        .score-total { font-size: 4rem; font-weight: 900; color: var(--dark); cursor: pointer; line-height: 1; }
        .rem-pts { font-size: 0.9rem; color: var(--dark); font-weight: bold; margin-bottom: 8px; }

        .history-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; border-top: 1.5px solid var(--dark); padding-top: 10px; margin-top: 5px; }
        .history-item { background: var(--dark); color: #fff; padding: 4px 10px; border-radius: 10px; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 6px; }

        /* فۆڵدەرەکانی مێژوو و ڕێکخستن */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; padding: 20px; overflow-y: auto; }
        .modal-box { background: #111; width: 100%; max-width: 450px; padding: 25px; border-radius: 30px; border: 2px solid var(--main); text-align: center; color: #fff; margin: auto; }
        
        .folder { background: #1a1a1a; border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(239,191,59,0.3); overflow: hidden; }
        .folder-head { padding: 15px; background: var(--main); color: #000; font-weight: 900; display: flex; justify-content: space-between; cursor: pointer; }
        .folder-body { display: none; padding: 15px; text-align: right; max-height: 300px; overflow-y: auto; }

        .history-record { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-right: 4px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .theme-item { height: 80px; border-radius: 10px; background-size: cover; background-position: center; border: 1px solid #444; cursor: pointer; }

        .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--dark); color: var(--main); padding: 12px; border-radius: 12px; text-decoration: none; margin-bottom: 10px; font-weight: bold; border: 1px solid var(--main); }

        /* شاشەی بردنەوە */
        #win-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 50000; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .win-card { background: #111; border: 3px solid var(--main); padding: 40px 20px; border-radius: 40px; text-align: center; width: 85%; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0); } to { transform: scale(1); } }

        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="openSettings()" style="font-size:1.8rem; cursor:pointer; color:var(--dark);">⚙️</div>
        <div class="timer-wrapper" id="timer-container" onclick="toggleTimer()">
            <span id="timer-icon" style="color:white">⏸️</span>
            <span id="game-timer">00:00</span>
        </div>
        <div class="logo-text" style="font-weight: 900;">AWEZA PC</div>
    </div>

    <div style="display:flex; justify-content:center; gap:12px; padding:15px;">
        <button onclick="setMode(2)" style="background:var(--dark); color:var(--main); border:none; padding:8px 20px; border-radius:12px; font-weight:900;">٢ نەفەری</button>
        <button onclick="setMode(3)" style="background:var(--dark); color:var(--main); border:none; padding:8px 20px; border-radius:12px; font-weight:900;">٣ نەفەری</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="settings-panel" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--main); margin-bottom:20px;">ڕێکخستنی ئاوێزە</h2>
            
            <div class="folder">
                <div class="folder-head" onclick="toggleF(this)"><span>📜 مێژووی بردنەوەکان</span><span>▼</span></div>
                <div id="game-history-list" class="folder-body">
                    </div>
            </div>

            <div class="folder">
                <div class="folder-head" onclick="toggleF(this)"><span>🎨 گۆڕینی باکگراوند</span><span>▼</span></div>
                <div class="folder-body theme-grid">
                    <div class="theme-item" style="background-image:url('https://blog.tmlirp.org/hs-fs/hubfs/abstract%20dominoes%20background.jpeg?width=900')" onclick="changeTheme(this.style.backgroundImage)"></div>
                    <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1769029174092-d26bc1a51efc?fm=jpg&q=60&w=3000')" onclick="changeTheme(this.style.backgroundImage)"></div>
                    <div class="theme-item" style="background-image:url('https://img.goodfon.com/wallpaper/big/6/2c/domino-makro-igra.webp')" onclick="changeTheme(this.style.backgroundImage)"></div>
                    <div class="theme-item" style="background-image:url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg')" onclick="changeTheme(this.style.backgroundImage)"></div>
                </div>
            </div>

            <div class="folder">
                <div class="folder-head" onclick="toggleF(this)"><span>📱 سۆشیال میدیا</span><span>▼</span></div>
                <div class="folder-body">
                    <a href="https://www.facebook.com/4116161-sketch" target="_blank" class="social-btn">🔵 Facebook: Aweza PC</a>
                    <a href="https://www.tiktok.com/@4116161-sketch" target="_blank" class="social-btn">⚫ TikTok: @Aweza_PC</a>
                </div>
            </div>

            <button class="btn" style="background:var(--red); color:#fff; margin-top:20px;" onclick="closeSettings()">گەڕانەوە</button>
        </div>
    </div>

    <div id="win-modal">
        <div class="win-card">
            <h1 style="font-size:5rem;">🏆</h1>
            <h1 style="color:var(--main); font-size:2.5rem;">پیرۆزە!</h1>
            <h2 id="winner-name" style="color:#fff; font-size:1.8rem; margin:10px 0;"></h2>
            <p id="winner-stats" style="color:#aaa; margin-bottom:20px;"></p>
            <button class="btn" style="background:var(--main); color:#000;" onclick="location.reload()">یاری نوێ 🔄</button>
        </div>
    </div>

    <div id="score-modal" class="modal" style="justify-content:center;">
        <div class="modal-box" style="max-width:350px;">
            <h2 id="modal-title" style="color:var(--main);">تۆمارکردن</h2>
            <input type="number" id="points-input" style="width:100%; font-size:4.5rem; background:none; border:none; border-bottom:4px solid var(--main); color:var(--main); text-align:center; outline:none; margin:20px 0;" placeholder="0" inputmode="numeric">
            <div id="confirm-box" style="display:none; margin-bottom:20px;">
                <p style="color:var(--red); font-weight:bold;">⚠️ ئەم خاڵە زۆرە، دڵنیایت؟</p>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button class="btn" style="background:var(--green);" onclick="saveScore()">بەڵێ</button>
                    <button class="btn" style="background:var(--red); color:#fff;" onclick="closeModal()">نەخێر</button>
                </div>
            </div>
            <div id="normal-btns" style="display:flex; gap:12px;">
                <button class="btn" style="background:var(--red); color:#fff;" onclick="closeModal()">لابردن</button>
                <button class="btn" style="background:var(--main); color:#000;" onclick="validateScore()">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <script>
        let players = {}; let curT = 1; let seconds = 0; let timerInterval; let isPaused = false;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    let m = Math.floor(seconds / 60); let s = seconds % 60;
                    document.getElementById('game-timer').innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
                }
            }, 1000);
        }

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('timer-container').parentElement.classList.toggle('paused', isPaused);
            document.getElementById('timer-icon').innerText = isPaused ? "▶️" : "⏸️";
        }

        function setMode(n) {
            players = {}; seconds = 0; isPaused = false; startTimer();
            const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) players[i] = { name: "یاریزان " + i, score: 0, history: [] };
            render();
        }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                let rem = 101 - players[i].score;
                let hHtml = players[i].history.map((pt, idx) => `<div class="history-item">${pt} <span style="color:var(--red);" onclick="deletePoint(${i}, ${idx})">×</span></div>`).join("");
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" class="player-input" value="${players[i].name}" onfocus="this.value=''" onchange="players[${i}].name=this.value">
                        <div class="score-total" onclick="openModal(${i})">${players[i].score}</div>
                        <div class="rem-pts">${rem} خاڵ ماوە</div>
                        <div class="history-list">${hHtml}</div>
                    </div>`;
            }
        }

        function validateScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (v >= 101) { alert("⛔ خاڵێکی نایاساییە!"); return; }
            if (v >= 50) { document.getElementById('confirm-box').style.display='block'; document.getElementById('normal-btns').style.display='none'; }
            else { saveScore(); }
        }

        function saveScore() {
            let v = parseInt(document.getElementById('points-input').value);
            players[curT].score += v; players[curT].history.push(v);
            render(); closeModal();
            if(players[curT].score >= 101) {
                confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
                finishGame(players[curT]);
            }
        }

        function finishGame(winner) {
            clearInterval(timerInterval);
            let time = document.getElementById('game-timer').innerText;
            let date = new Date().toLocaleDateString('ku-IQ');
            
            // پاشەکەوتکردن لە مێژوو
            let history = JSON.parse(localStorage.getItem('aweza_history') || '[]');
            history.unshift({ name: winner.name, score: winner.score, time: time, date: date });
            localStorage.setItem('aweza_history', JSON.stringify(history));

            document.getElementById('winner-name').innerText = winner.name;
            document.getElementById('winner-stats').innerText = `نمرە: ${winner.score} | کات: ${time}`;
            document.getElementById('win-modal').style.display = 'flex';
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('aweza_history') || '[]');
            let list = document.getElementById('game-history-list');
            list.innerHTML = history.length ? "" : "<p style='text-align:center; opacity:0.5;'>هیچ یارییەک نەکراوە</p>";
            history.forEach(item => {
                list.innerHTML += `
                    <div class="history-record">
                        <div><b>${item.name}</b><br><small style="opacity:0.6">${item.date}</small></div>
                        <div style="text-align:left"><b style="color:var(--main)">${item.score}</b><br><small>${item.time}</small></div>
                    </div>`;
            });
        }

        function deletePoint(p, h) { event.stopPropagation(); players[p].score -= players[p].history[h]; players[p].history.splice(h, 1); render(); }
        function openModal(t) { curT = t; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').value = ""; document.getElementById('confirm-box').style.display='none'; document.getElementById('normal-btns').style.display='flex'; }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }
        function openSettings() { loadHistory(); document.getElementById('settings-panel').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-panel').style.display = 'none'; }
        function toggleF(h) { let b = h.nextElementSibling; b.style.display = (b.style.display==='block'?'none':'block'); }
        function changeTheme(img) { document.body.style.backgroundImage = img; localStorage.setItem('aweza_bg', img); }

        window.onload = () => { setMode(2); let bg = localStorage.getItem('aweza_bg'); if(bg) document.body.style.backgroundImage = bg; };
    </script>
</body>
</html>
