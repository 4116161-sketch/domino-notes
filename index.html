<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە - Aweza PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* پاشبنەمای ڤیدیۆیی */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: blur(5px) brightness(0.3); }

        /* لۆگۆ */
        .logo-section { text-align: center; padding: 15px 10px; z-index: 10; }
        .logo-text { font-size: 2.2rem; font-weight: 900; color: var(--main); text-shadow: 0 0 15px rgba(239,191,59,0.5); }

        /* مێنۆی ڕێکخستن */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; padding: 25px; overflow-y: auto; }
        .set-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }

        /* کارتەکان و ناوەکان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 85%; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.08); border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(15px); padding-bottom: 10px; }
        .card-header { background: rgba(255,255,255,0.1); padding: 10px; text-align: center; border-radius: 20px 20px 0 0; }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; font-size: 1rem; }
        .score-total { font-size: 3rem; font-weight: 900; text-align: center; margin: 5px 0; }

        /* پۆپ-ئەپی نمرە نوێ (بە Quick Math) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; padding: 25px; border-radius: 30px; border: 2px solid var(--main); text-align: center; }
        .modal-input { width: 80%; background: transparent; border: none; border-bottom: 3px solid var(--main); color: var(--main); font-size: 5rem; text-align: center; outline: none; margin: 10px 0; }
        .quick-math { color: #888; font-size: 0.9rem; margin-top: 5px; }

        /* پێشنیاری ناوەکان (Autocomplete) */
        .suggest-box { background: #222; border-radius: 10px; margin-top: 5px; max-height: 100px; overflow-y: auto; display: none; }
        .suggest-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }

        .btn { background: var(--main); color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body id="app-body">

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fire-flames-flicker-in-the-dark-4428-large.mp4" type="video/mp4">
    </video>

    <audio id="domino-sound" src="https://www.soundjay.com/buttons/sounds/button-20.mp3" preload="auto"></audio>

    <div id="settings-panel">
        <h2 style="color:var(--main); text-align:center;">⚙️ ڕێکخستن</h2>
        <div class="set-card">
            <p>👥 گۆڕینی یاریزان</p>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" onclick="setMode(2)" style="flex:1;">٢ نەفەری</button>
                <button class="btn" onclick="setMode(3)" style="flex:1;">٣ نەفەری</button>
            </div>
        </div>
        <div class="set-card">
            <p>📜 یاساکانی دۆمینە</p>
            <div style="font-size:0.8rem; color:#ccc; margin-top:10px; line-height:1.6;">
                ١. هەر یاریزانێک ٧ بەرد دەبات.<br>
                ٢. یاری بە "دوو شەش" دەست پێ دەکات.<br>
                ٣. هەر کەسێک زووتر بەردەکانی تەواو بوو دەبێتە براوە.
            </div>
        </div>
        <button class="btn" onclick="document.getElementById('settings-panel').style.display='none'" style="width:100%; margin-top:20px;">داخستن</button>
    </div>

    <div class="logo-section"><div class="logo-text">AWEZA PC</div></div>

    <div style="display:flex; justify-content:space-between; padding:10px 15px; align-items:center;">
        <div onclick="document.getElementById('settings-panel').style.display='flex';" style="font-size:1.8rem; cursor:pointer;">⚙️</div>
        <div id="game-timer" style="font-family:monospace; color:var(--main); font-weight:bold; font-size:1.2rem; background:#111; padding:5px 12px; border-radius:10px;">00:00</div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" value="101" onchange="updateGoal()" style="background:#000; color:var(--main); border:1px solid #333; width:45px; text-align:center; border-radius:5px;"></div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" oninput="doQuickMath(this.value)">
            </form>
            <div id="quick-math-text" class="quick-math">مایە بۆ بردنەوە: --</div>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:20px;">
                <span onclick="document.getElementById('score-modal').style.display='none'" style="font-size:2.5rem; color:var(--red);">✖️</span>
                <span onclick="addScore()" style="font-size:2.5rem; color:var(--green);">✔️</span>
            </div>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size:5rem;">🏆</h1>
        <h2 id="winner-display" style="font-size:2.5rem; color:var(--main); margin:15px 0;">ناو</h2>
        <button class="btn">یاری نوێ 🔄</button>
    </div>

    <script>
        let curT = 0, goal = 101, players = {}, seconds = 0, timerInterval, isPaused = false;
        let savedNames = JSON.parse(localStorage.getItem('saved_names') || '[]');

        // ١. گەڕاندنەوەی یاری (Game Recovery)
        window.onload = () => {
            const lastGame = JSON.parse(localStorage.getItem('last_game'));
            if(lastGame) { players = lastGame.players; seconds = lastGame.seconds; goal = lastGame.goal; renderAll(); startTimer(); }
            else { setMode(2); }
        }

        function saveGame() {
            localStorage.setItem('last_game', JSON.stringify({ players, seconds, goal }));
        }

        // ٢. لەرینەوەی جیاواز (Vibration Feedback)
        function vibrate(val) {
            if (!navigator.vibrate) return;
            if (val >= 50) navigator.vibrate([100, 50, 100]);
            else if (val >= 20) navigator.vibrate(100);
            else navigator.vibrate(50);
        }

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) { 
                players[i] = { name: (n==2?`تیمی ${i}`:`یاریزان ${i}`), s: 0, h: [] }; 
            }
            renderAll(); startTimer();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" oninput="handleNameInput(this, ${i})" onblur="saveName(${i})">
                        </div>
                        <div class="score-total" onclick="openModal(${i})">${players[i].s}</div>
                        <div style="height:120px; overflow-y:auto; border-top:1px solid rgba(255,255,255,0.05);">${players[i].h.map((v, idx) => `<div style="display:flex; justify-content:space-between; padding:5px 15px;"><span>${idx+1}</span><span>${v}</span><span onclick="delScore(${i},${idx})" style="color:var(--red)">×</span></div>`).join('')}</div>
                    </div>`;
            }
            saveGame();
        }

        // ٣. پێشنیاری ناو (Player Profiles)
        function handleNameInput(el, id) {
            players[id].name = el.value;
            // لێرە دەتوانیت لیستێکی پێشنیار دروست بکەیت ئەگەر پێت باش بوو
        }

        function saveName(id) {
            let n = players[id].name;
            if(n && !savedNames.includes(n)) { savedNames.push(n); localStorage.setItem('saved_names', JSON.stringify(savedNames)); }
        }

        function openModal(t) { 
            curT = t; document.getElementById('modal-title').innerText = players[t].name; 
            document.getElementById('points-input').value = ""; document.getElementById('score-modal').style.display = 'flex'; 
            document.getElementById('points-input').focus(); doQuickMath(0);
        }

        // ٤. نمرەی خێرا (Quick Math)
        function doQuickMath(val) {
            let current = players[curT].s;
            let needed = goal - current - (parseInt(val) || 0);
            document.getElementById('quick-math-text').innerText = `مایە بۆ بردنەوە: ${needed}`;
            document.getElementById('quick-math-text').style.color = needed <= 0 ? "var(--green)" : "#888";
        }

        function addScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (isNaN(v) || v === 0) return;

            // ٥. دڵنیابوونەوە (Anti-Mistake)
            if (v > 150 && !confirm(`نمرەی ${v} زۆر گەورەیە، دڵنیای؟`)) return;

            // ٦. دەنگ و لەرینەوە (Sounds)
            document.getElementById('domino-sound').play();
            vibrate(v);

            players[curT].s += v; players[curT].h.push(v); renderAll();
            if(players[curT].s >= goal) {
                confetti({ particleCount: 300, spread: 80 });
                document.getElementById('winner-display').innerText = players[curT].name;
                document.getElementById('win-overlay').style.display = 'flex';
                localStorage.removeItem('last_game');
            }
            document.getElementById('score-modal').style.display = 'none';
        }

        // ٧. تایمەری زیرەک (Smart Timer)
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                let display = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                const tEl = document.getElementById('game-timer');
                tEl.innerText = display;
                if(m >= 60) tEl.style.color = "var(--red)"; // دوای ١ کاتژمێر سوور دەبێت
                saveGame();
            }, 1000);
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }
        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }
    </script>
</body>
</html>
