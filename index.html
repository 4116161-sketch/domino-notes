<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە - Aweza PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* ڤیدیۆی پاشبنەما - دڵنیابوونەوە لەوەی هەموو شاشەکە دەگرێتەوە */
        #video-bg {
            position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -2; 
            object-fit: cover; filter: blur(3px) brightness(0.3);
        }

        .logo-header { text-align: center; padding: 15px 10px 5px; z-index: 10; }
        .logo-text { font-size: 2rem; font-weight: 900; color: var(--main); text-shadow: 0 0 15px rgba(239,191,59,0.5); letter-spacing: 2px; }
        
        .top-nav { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 10px; border: 1px solid #444; }
        #game-timer { font-family: monospace; color: var(--main); font-weight: bold; font-size: 1.2rem; }
        .paused { color: #f55 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 80%; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.08); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding-bottom: 10px; }
        .card-header { background: rgba(255,255,255,0.1); padding: 10px; text-align: center; border-radius: 25px 25px 0 0; }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; font-size: 1.1rem; }
        
        .score-total { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 5px 0; }
        .history-list { height: 140px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .hist-item { display: flex; justify-content: space-between; padding: 8px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 1.6rem; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; padding: 30px; border-radius: 25px; border: 2px solid var(--main); text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid var(--main); color: #fff; font-size: 5.5rem; text-align: center; outline: none; margin: 15px 0; }

        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn { background: var(--main); color: #000; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body id="app-body">

    <video id="video-bg" autoplay muted loop playsinline poster="https://i.imgur.com/8pMvYmX.jpg">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
        </video>

    <div class="logo-header">
        <div class="logo-text">AWEZA PC</div>
    </div>

    <div class="top-nav">
        <div onclick="location.reload()" style="font-size:1.8rem; cursor:pointer;">⚙️</div>
        <div class="timer-box">
            <span id="game-timer">00:00</span>
            <span id="pause-btn" onclick="toggleTimer()" style="cursor:pointer; margin-right:5px;">⏸️</span>
        </div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" value="101" onchange="updateGoal()" style="background:rgba(0,0,0,0.5); color:var(--main); border:1px solid #333; width:50px; text-align:center; border-radius:5px;"></div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            </form>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size:5rem;">🏆</h1>
        <h2 id="winner-display" style="font-size:2.5rem; color:var(--main); margin:15px 0;">ناو</h2>
        <button class="btn">یاری نوێ 🔄</button>
    </div>

    <script>
        // چالاککردنی ڤیدیۆ بە دەست ئەگەر مۆبایل ڕێگەی نەدا
        window.addEventListener('touchstart', function() {
            const video = document.getElementById('video-bg');
            if (video.paused) { video.play(); }
        }, {once: true});

        let curT = 0, goal = 101, players = {}, seconds = 0, timerInterval, isPaused = false;

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️" : "⏸️";
            document.getElementById('game-timer').classList.toggle('paused', isPaused);
        }

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) { 
                let name = (n==2)?(i==1?"👨 تیمی یەکەم":"👨 تیمی دووەم"):(i==1?"👨 کەسی یەکەم":i==2?"👨 کەسی دووەم":"👨 کەسی سێیەم");
                players[i] = { name: name, s: 0, h: [] }; 
            }
            renderAll(); startTimer();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <span onclick="openModal(${i})" style="font-size:2.5rem; cursor:pointer; color:var(--main); font-weight:bold; display:block;">+</span>
                        </div>
                        <div class="score-total">${players[i].s}</div>
                        <div class="history-list">${players[i].h.map((v, idx) => `<div class="hist-item"><span>${idx+1}</span><span>${v}</span><span onclick="delScore(${i},${idx})" style="color:#f55;">×</span></div>`).join('')}</div>
                    </div>`;
            }
        }

        function openModal(t) { curT = t; document.getElementById('modal-title').innerText = players[t].name; document.getElementById('points-input').value = ""; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); }
        function addScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (!isNaN(v) && v !== 0) {
                players[curT].s += v; players[curT].h.push(v); renderAll();
                if(players[curT].s >= goal) {
                    confetti({ particleCount: 200, spread: 70 });
                    document.getElementById('winner-display').innerText = players[curT].name;
                    document.getElementById('win-overlay').style.display = 'flex';
                }
            }
            document.getElementById('score-modal').style.display = 'none';
        }

        function startTimer() { timerInterval = setInterval(() => { if(!isPaused) { seconds++; let m = Math.floor(seconds / 60).toString().padStart(2, '0'); let s = (seconds % 60).toString().padStart(2, '0'); document.getElementById('game-timer').innerText = `${m}:${s}`; } }, 1000); }
        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }
        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        setMode(2);
    </script>
</body>
</html>
