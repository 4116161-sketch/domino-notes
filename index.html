<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە - Diamond</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #efbf3b; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000;
            color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            position: relative;
        }

        /* پاشبنەمای ئەنیمەیشن */
        body::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, #600 0%, transparent 40%);
            animation: moveBg 10s infinite alternate linear; z-index: -1; opacity: 0.6;
        }
        @keyframes moveBg { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 1s ease;
        }
        .splash-card { padding: 40px; border-radius: 30px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 50px rgba(239,191,59,0.2); }

        /* Top Bar */
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); align-items: center; border-bottom: 1px solid var(--border); }
        .goal-input { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: var(--gold); width: 65px; text-align: center; border-radius: 10px; font-weight: bold; padding: 5px; font-size: 1rem; }

        /* Game Cards */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 80%; margin: 0 auto; }

        .card { 
            background: var(--glass); border-radius: 25px; border: 1px solid var(--border); 
            padding-bottom: 10px; backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .card-header { background: linear-gradient(180deg, rgba(136,0,0,0.8), transparent); padding: 15px; text-align: center; border-radius: 25px 25px 0 0; }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; font-size: 1.1rem; outline: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .score-total { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 10px 0; color: #fff; letter-spacing: -1px; }
        .limit-txt { font-size: 0.9rem; color: #777; font-weight: normal; }

        .history-list { height: 160px; overflow-y: auto; border-top: 1px solid var(--border); margin: 0 10px; }
        .hist-item { display: flex; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.5rem; font-weight: bold; color: #ddd; }
        .btn-del { color: #ff5252; cursor: pointer; opacity: 0.7; }

        .plus-btn { font-size: 2.8rem; color: var(--gold); cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-block; }
        .plus-btn:active { transform: scale(1.2); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { background: #111; width: 88%; padding: 40px; border-radius: 35px; border: 1px solid #600; text-align: center; box-shadow: 0 0 40px rgba(100,0,0,0.5); }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid #800; color: #fff; font-size: 5.5rem; text-align: center; outline: none; margin: 20px 0; font-weight: bold; }

        .mode-btn { background: #111; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 0.9rem; }
        .active-mode { background: var(--gold); color: #000; font-weight: bold; border: none; box-shadow: 0 0 15px rgba(239,191,59,0.4); }

        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-card">
            <h1 style="color:var(--gold); font-size:2.5rem; margin-bottom:10px;">خاڵژمێری دۆمینە</h1>
            <p style="color:#888; letter-spacing:1px;">تۆمارکردنی خاڵی یاری دۆمینە</p>
            <p style="margin-top:20px; font-size:0.8rem; color:#444;">Aweza PC Edition</p>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size: 6rem;">🏆</h1>
        <h2 id="winner-display" style="font-size: 3rem; color:var(--gold); margin: 20px 0;">تیم</h2>
        <h2 style="font-weight: 300;">پیرۆزە! تۆ دۆمینەزانی</h2>
        <button style="margin-top:50px; background:var(--gold); color:#000; border:none; padding:18px 60px; border-radius:25px; font-weight:bold; font-size:1.4rem;">یاری نوێ 🔄</button>
    </div>

    <div class="top-nav">
        <div onclick="showHistory()" style="font-weight:bold; color:var(--gold); cursor:pointer;">⚙️ مێژوو</div>
        <div>ئامانج: <input type="number" id="goal-val" class="goal-input" value="101" onchange="updateGoal()"></div>
        <div>
            <button class="mode-btn" id="btn-2" onclick="setMode(2)">٢ نەفەری</button>
            <button class="mode-btn" id="btn-3" onclick="setMode(3)">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--gold); font-size:1.4rem;">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            </form>
            <p style="color:#444;">بۆ تۆمارکردن Enter دابگرە</p>
        </div>
    </div>

    <script>
        window.onload = () => { setTimeout(() => { const s = document.getElementById('splash'); s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 1000); }, 2000); };

        let curT = 0; let goal = 101;
        let players = {};

        function setMode(n) {
            players = {};
            const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) { 
                let name = (n == 2) ? (i==1 ? "تیمی یەکەم 👨" : "تیمی دووەم 👨") : (i==1 ? "کەسی یەکەم 👨" : i==2 ? "کەسی دووەم 👨" : "کەسی سێیەم 👨");
                players[i] = { name: name, s: 0, h: [] }; 
            }
            document.getElementById('btn-2').className = (n==2 ? 'mode-btn active-mode' : 'mode-btn');
            document.getElementById('btn-3').className = (n==3 ? 'mode-btn active-mode' : 'mode-btn');
            renderAll();
        }

        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <span class="plus-btn" onclick="openModal(${i})">+</span>
                        </div>
                        <div class="score-total">${players[i].s} <span class="limit-small">/${goal}</span></div>
                        <div class="history-list">
                            ${players[i].h.map((val, idx) => `
                                <div class="hist-item">
                                    <span style="color:#333">${idx+1}</span>
                                    <span>${val}</span>
                                    <span class="btn-del" onclick="delScore(${i}, ${idx})">×</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function openModal(t) { curT = t; document.getElementById('modal-title').innerText = players[t].name; document.getElementById('points-input').value = ""; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }
        function addScore() {
            let val = parseInt(document.getElementById('points-input').value);
            if (!isNaN(val) && val !== 0) {
                players[curT].s += val;
                players[curT].h.push(val);
                renderAll();
                if(players[curT].s >= goal) { 
                    if (navigator.vibrate) navigator.vibrate([1000, 200, 1000]);
                    confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
                    document.getElementById('winner-display').innerText = players[curT].name;
                    document.getElementById('win-overlay').style.display = 'flex';
                }
            }
            closeModal();
        }
        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }

        setMode(2);
    </script>
</body>
</html>
