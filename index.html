<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خاڵژمێری ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --bg-img: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200'); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-image: var(--bg-img);
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.8s;
        }

        .overlay-glass { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: -1; }

        /* مێنیوی سەرەکی */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.3); }
        .mode-selector { display: flex; justify-content: center; gap: 10px; padding: 10px; background: rgba(255,255,255,0.05); }
        .mode-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--main); color: #fff; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .mode-btn.active { background: var(--main); color: #000; }

        /* کارتەکانی نمرە */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 70%; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(15px); padding: 15px; text-align: center; }
        .score-total { font-size: 3.5rem; font-weight: 900; color: var(--main); margin: 10px 0; cursor: pointer; }

        /* ڕێکخستنی باکگراوند */
        #settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 9999; flex-direction: column; padding: 20px; overflow-y: auto; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .theme-item { height: 70px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; background-size: cover; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; text-shadow: 0 0 5px #000; }

        /* مۆداڵ */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; width: 85%; padding: 25px; border-radius: 30px; border: 2px solid var(--main); z-index: 10000; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .btn { background: var(--main); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay-glass"></div>

    <div class="header">
        <h1 style="color: var(--main); font-size: 1.8rem;">AWEZA PC</h1>
        <div onclick="document.getElementById('settings-panel').style.display='flex'" style="font-size:1.8rem; cursor:pointer;">⚙️</div>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode(2, this)">٢ نەفەری</button>
        <button class="mode-btn" onclick="setMode(3, this)">٣ نەفەری</button>
        <button class="mode-btn" onclick="setMode(4, this)">تیمی (٤)</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="settings-panel">
        <h2 style="color:var(--main); text-align:center; margin-bottom:15px;">🎨 باکگراوندە نایابەکان</h2>
        <div class="theme-grid">
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400')" onclick="changeTheme(this.style.backgroundImage, '#efbf3b')">زێڕینی Abstract</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=400')" onclick="changeTheme(this.style.backgroundImage, '#ff4444')">تاریکی سوور</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?w=400')" onclick="changeTheme(this.style.backgroundImage, '#00d2ff')">نیۆنی شین</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400')" onclick="changeTheme(this.style.backgroundImage, '#00ff88')">زمردی سەوز</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=400')" onclick="changeTheme(this.style.backgroundImage, '#ff00ff')">پەمەیی ناوازە</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400')" onclick="changeTheme(this.style.backgroundImage, '#ffffff')">کێوی بەفرین</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?w=400')" onclick="changeTheme(this.style.backgroundImage, '#efbf3b')">بیابانی زێڕین</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400')" onclick="changeTheme(this.style.backgroundImage, '#00ff88')">سروشتی شین</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?w=400')" onclick="changeTheme(this.style.backgroundImage, '#ff4444')">هەورە تاریکەکان</div>
            <div class="theme-item" style="background-image:url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400')" onclick="changeTheme(this.style.backgroundImage, '#ffffff')">ئەستێرەکان</div>
        </div>
        <button class="btn" style="background:#ff4444; color:#fff; margin-top:20px;" onclick="document.getElementById('settings-panel').style.display='none'">داخستن</button>
    </div>

    <div id="score-modal" class="modal">
        <h2 id="modal-title" style="color:var(--main);">نمرە بنووسە</h2>
        <input type="number" id="points-input" style="width:80%; font-size:3.5rem; background:none; border:none; border-bottom:3px solid var(--main); color:var(--main); text-align:center; outline:none; margin:20px 0;" inputmode="numeric">
        <div style="display:flex; gap:15px;">
            <button class="btn" style="background:#ff4444; color:#fff;" onclick="closeModal()">✖️ پاشگەزبوونەوە</button>
            <button class="btn" onclick="checkValue()">✔️ تۆمارکردن</button>
        </div>
    </div>

    <script>
        let players = {};
        let curT = 1;
        let goal = 101;

        function setMode(n, btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            players = {};
            const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            
            for(let i=1; i<=n; i++) {
                players[i] = { name: (n === 4 ? "تیمی " + i : "یاریزان " + i), score: 0 };
            }
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" value="${players[i].name}" onchange="players[${i}].name=this.value" style="background:none; border:none; color:#ddd; text-align:center; width:100%; font-weight:bold;">
                        <div class="score-total" onclick="openModal(${i})">${players[i].score}</div>
                    </div>`;
            }
        }

        function openModal(t) {
            curT = t;
            document.getElementById('modal-title').innerText = players[t].name;
            document.getElementById('score-modal').style.display = 'block';
            document.getElementById('points-input').value = "";
            document.getElementById('points-input').focus();
        }

        function closeModal() {
            document.getElementById('score-modal').style.display = 'none';
        }

        function checkValue() {
            let v = parseInt(document.getElementById('points-input').value);
            if (isNaN(v)) return;

            // ئاگادارکردنەوە توندەکەی ئاوێزە PC
            if (v >= 101) {
                if (navigator.vibrate) { navigator.vibrate(500); }
                alert("خاڵژمێری دۆمینە\n\n⛔ ئاگاداری: ئەم خاڵە لە یاساکانی دۆمینەی ئاوێزە PC ناگونجێت! تکایە نمرەیەکی دروست تۆمار بکە.");
                return;
            }

            players[curT].score += v;
            renderAll();
            
            if (players[curT].score >= goal) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                alert("🏆 پیرۆزە! " + players[curT].name + " یارییەکەی بردەوە!");
                // سفرکردنەوەی یاری
                for(let p in players) players[p].score = 0;
                renderAll();
            }
            closeModal();
        }

        function changeTheme(img, color) {
            document.documentElement.style.setProperty('--bg-img', img);
            document.documentElement.style.setProperty('--main', color);
            localStorage.setItem('aweza_bg', img);
            localStorage.setItem('aweza_color', color);
        }

        window.onload = () => {
            const savedBg = localStorage.getItem('aweza_bg');
            const savedColor = localStorage.getItem('aweza_color');
            if(savedBg) changeTheme(savedBg, savedColor);
            setMode(2, document.querySelector('.mode-btn'));
        };
    </script>
</body>
</html>
