<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خاڵژمێری ئاوێزە</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 600px;
        }

        .team-card {
            flex: 1;
            border: 2px solid #333;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 400px;
        }

        /* بەشی ناو گۆڕین */
        .team-name {
            background: transparent;
            border: none;
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            width: 100%;
            outline: none;
        }

        .score-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .temp-input {
            font-size: 2rem;
            color: #666;
            margin-bottom: 20px;
            min-height: 40px;
        }

        /* دوگمەی زەردی خڕ وەک وێنەکە */
        .add-btn {
            background-color: #fdd835;
            color: #000;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(253, 216, 53, 0.3);
        }

        /* شاشەی پیرۆزبایی ناوخۆیی وەک وێنەکە */
        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .win-title { color: #fdd835; font-size: 2.5rem; margin-bottom: 20px; }
        .win-text { font-size: 1.5rem; margin-bottom: 40px; }
        .new-game-btn { color: #5c5cff; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; }

        /* کیبۆردی ژمارەکان تەنها کاتێک دەست لە (+) دەدەیت */
        #numpad {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            grid-template-columns: repeat(3, 1fr);
            padding: 10px;
            gap: 10px;
        }
        .num-btn { background: #222; color: #fff; border: none; padding: 20px; font-size: 1.5rem; border-radius: 10px; }
        .done-btn { background: #fdd835; color: #000; grid-column: span 3; padding: 15px; font-weight: bold; border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="team-card">
            <input type="text" class="team-name" value="تیمی ١" id="tn1">
            <div class="score-display" id="s1">0</div>
            <div class="temp-input" id="t1">0</div>
            <button class="add-btn" onclick="showNumpad(1)">+</button>
        </div>

        <div class="team-card">
            <input type="text" class="team-name" value="تیمی ٢" id="tn2">
            <div class="score-display" id="s2">0</div>
            <div class="temp-input" id="t2">0</div>
            <button class="add-btn" onclick="showNumpad(2)">+</button>
        </div>
    </div>

    <div id="win-overlay">
        <div class="win-title">🏆 پیرۆزە!</div>
        <div class="win-text" id="winner-info">بردییەوە!</div>
        <button class="new-game-btn" onclick="resetGame()">یاری نوێ</button>
    </div>

    <div id="numpad">
        <button class="num-btn" onclick="press(1)">1</button>
        <button class="num-btn" onclick="press(2)">2</button>
        <button class="num-btn" onclick="press(3)">3</button>
        <button class="num-btn" onclick="press(4)">4</button>
        <button class="num-btn" onclick="press(5)">5</button>
        <button class="num-btn" onclick="press(6)">6</button>
        <button class="num-btn" onclick="press(7)">7</button>
        <button class="num-btn" onclick="press(8)">8</button>
        <button class="num-btn" onclick="press(9)">9</button>
        <button class="num-btn" style="background:#ff5252" onclick="clearInput()">C</button>
        <button class="num-btn" onclick="press(0)">0</button>
        <button class="done-btn" onclick="submitScore()">تەواو</button>
    </div>

    <script>
        let scores = {1: 0, 2: 0};
        let activeTeam = 0;
        let currentEntry = "";

        function showNumpad(team) {
            activeTeam = team;
            currentEntry = "";
            document.getElementById('numpad').style.display = 'grid';
        }

        function press(n) {
            currentEntry += n;
            document.getElementById('t' + activeTeam).innerText = currentEntry;
            document.getElementById('t' + activeTeam).style.color = "#fff";
        }

        function clearInput() {
            currentEntry = "";
            document.getElementById('t' + activeTeam).innerText = "0";
            document.getElementById('t' + activeTeam).style.color = "#666";
        }

        function submitScore() {
            let val = parseInt(currentEntry) || 0;
            scores[activeTeam] += val;
            document.getElementById('s' + activeTeam).innerText = scores[activeTeam];
            
            if (scores[activeTeam] >= 101) {
                let name = document.getElementById('tn' + activeTeam).value;
                document.getElementById('winner-info').innerText = name + " بردییەوە!";
                document.getElementById('win-overlay').style.display = 'flex';
            }

            document.getElementById('t' + activeTeam).innerText = "0";
            document.getElementById('t' + activeTeam).style.color = "#666";
            document.getElementById('numpad').style.display = 'none';
        }

        function resetGame() {
            scores = {1: 0, 2: 0};
            document.getElementById('s1').innerText = "0";
            document.getElementById('s2').innerText = "0";
            document.getElementById('win-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
