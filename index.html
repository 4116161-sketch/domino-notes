<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خاڵژمێری ئاوێزە</title>
    <style>
        :root {
            --bg: #0a2e12;
            --gold: #ffd700;
            --white: #ffffff;
            --card: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle, #1b5e20, #0a2e12);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* ستایلی تیمەکان و ناو گۆڕین ڕاستەوخۆ لەسەر شاشە */
        .game-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 450px;
            margin-top: 20px;
        }

        .team-box {
            flex: 1;
            background: var(--card);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* لێرەدا دەتوانیت ناوەکە بگۆڕیت بە دەست لێدان */
        .team-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 90%;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            outline: none;
        }

        .score-text {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* خانەی خاڵ نووسین */
        .points-field {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: white;
            color: black;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        .add-btn {
            background: var(--gold);
            color: black;
            border: none;
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
        }

        /* پیرۆزبایی ناوخۆیی */
        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .win-box {
            background: var(--gold);
            color: black;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .reset-all {
            margin-top: 40px;
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <h2 style="color:var(--gold)">خاڵژمێری ئاوێزە</h2>

    <div class="game-container">
        <div class="team-box">
            <input type="text" class="team-input" value="تیمی ١" id="name1">
            <div class="score-text" id="s1">0</div>
            <input type="number" class="points-field" id="in1" placeholder="خاڵ..." inputmode="numeric">
            <button class="add-btn" onclick="addPoints(1)">زیادکردن +</button>
        </div>

        <div class="team-box">
            <input type="text" class="team-input" value="تیمی ٢" id="name2">
            <div class="score-text" id="s2">0</div>
            <input type="number" class="points-field" id="in2" placeholder="خاڵ..." inputmode="numeric">
            <button class="add-btn" onclick="addPoints(2)">زیادکردن +</button>
        </div>
    </div>

    <button class="reset-all" onclick="resetGame()">یاری نوێ 🔄</button>

    <div id="win-overlay" onclick="this.style.display='none'">
        <div class="win-box">
            <h1 style="margin:0">🏆 پیرۆزە!</h1>
            <h2 id="winner-txt"></h2>
            <p>بۆ داخستن دەست لە شاشەکە بدە</p>
        </div>
    </div>

    <script>
        let scores = {1: 0, 2: 0};

        function addPoints(team) {
            let input = document.getElementById('in' + team);
            let val = parseInt(input.value);

            if (!isNaN(val) && val !== 0) {
                scores[team] += val;
                if (scores[team] < 0) scores[team] = 0;
                
                document.getElementById('s' + team).innerText = scores[team];
                input.value = ""; // خانەکە پاک دەکاتەوە

                if (scores[team] >= 101) {
                    showWin(document.getElementById('name' + team).value);
                }
            }
        }

        function showWin(name) {
            document.getElementById('winner-txt').innerText = name + " بردییەوە!";
            document.getElementById('win-overlay').style.display = 'flex';
        }

        function resetGame() {
            scores = {1: 0, 2: 0};
            document.getElementById('s1').innerText = "0";
            document.getElementById('s2').innerText = "0";
        }
    </script>
</body>
</html>
