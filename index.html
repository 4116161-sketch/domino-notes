<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000 radial-gradient(circle, #500 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* شاشەی پیرۆزبایی (وەک وێنەکە بەڵام بە کوردی) */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }
        .win-box h1 { font-size: 5rem; color: #fff; margin-bottom: 5px; }
        .win-box h2 { font-size: 2.5rem; color: #fff; font-weight: 300; }

        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.5); align-items: center; }
        .goal-input { background: #111; border: 1px solid #efbf3b; color: #efbf3b; width: 60px; text-align: center; border-radius: 5px; }

        /* دیزاینی کارتەکان (٣ نەفەری وەک وێنەکە) */
        .game-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; padding: 10px; flex: 1; 
            align-content: start;
        }
        /* کارتی سێیەم دەخەینە ناوەڕاستی خوارەوە */
        .card:nth-child(3):last-child {
            grid-column: span 2;
            width: 60%;
            margin: 0 auto;
        }

        .card { 
            background: rgba(255,255,255,0.05); border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
            display: flex; flex-direction: column;
        }
        .card-header { background: #800; padding: 10px; text-align: center; border-radius: 15px 15px 0 0; position: relative; }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; }
        
        .score-total { font-size: 2.5rem; font-weight: bold; text-align: center; margin: 5px 0; }
        .history-list { height: 120px; overflow-y: auto; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .hist-item { display: flex; justify-content: space-between; padding: 5px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-del { color: #ff5252; cursor: pointer; }

        /* پەنجەرەی نمرە */
        #score-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; padding: 30px; border-radius: 20px; border: 1px solid #efbf3b; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #efbf3b; color: #fff; font-size: 3rem; text-align: center; outline: none; margin: 20px 0; }

        .footer { padding: 15px; display: flex; justify-content: space-around; }
        .restart { background: #800; color: #fff; border: none; padding: 10px 30px; border-radius: 10px; font-weight: bold; }
        .mode-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 15px; border-radius: 10px; }
        .active-mode { background: #800; border: none; }
    </style>
</head>
<body>

    <div id="win-overlay" onclick="location.reload()">
        <div class="win-box">
            <h1 id="winner-display">تیمی ١</h1>
            <h2>بردییەوە</h2>
            <p style="color:#666; margin-top:20px;">بۆ دەستپێکردنەوە دەست لێرە بدە</p>
        </div>
    </div>

    <div class="top-nav">
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" class="goal-input" value="101" onchange="updateGoal()"></div>
        <div>
            <button class="mode-btn active-mode" id="btn-2" onclick="setMode(2)">٢ نەفەری</button>
            <button class="mode-btn" id="btn-3" onclick="setMode(3)">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal">
        <div class="modal-box">
            <h2 id="modal-title">ناو</h2>
            <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            <div style="display:flex; gap:10px;">
                <button onclick="closeModal()" style="flex:1; background:#333; color:#fff; border:none; padding:15px; border-radius:10px;">پاشگەزبوونەوە</button>
                <button onclick="addScore()" style="flex:1; background:#800; color:#fff; border:none; padding:15px; border-radius:10px;">تەواو OK</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="restart" onclick="location.reload()">RESTART</button>
        <button style="background:#fff; color:#000; border:none; padding:5px 15px; border-radius:8px; font-weight:bold;">ئاوێزە PC</button>
    </div>

    <script>
        let curT = 0; let goal = 101;
        let players = {};

        function setMode(n) {
            players = {};
            for(let i=1; i<=n; i++) { players[i] = { name: (i==1?'home':(i==2?'visitor':'visitor1')), s: 0, h: [] }; }
            document.getElementById('btn-2').classList.toggle('active-mode', n==2);
            document.getElementById('btn-3').classList.toggle('active-mode', n==3);
            renderAll();
        }

        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <div style="font-size:1.5rem; cursor:pointer;" onclick="openModal(${i})">+</div>
                        </div>
                        <div class="score-total">${players[i].s} <span style="font-size:0.8rem; color:#888;">/${goal}</span></div>
                        <div class="history-list">
                            ${players[i].h.map((val, idx) => `
                                <div class="hist-item">
                                    <span style="color:#555">${idx+1}</span>
                                    <span>${val}</span>
                                    <span class="btn-del" onclick="delScore(${i}, ${idx})">×</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function openModal(t) { curT = t; document.getElementById('modal-title').innerText = players[t].name; document.getElementById('points-input').value = ""; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }

        function addScore() {
            let val = parseInt(document.getElementById('points-input').value);
            if (!isNaN(val) && val !== 0) {
                players[curT].s += val;
                players[curT].h.push(val);
                renderAll();
                if(players[curT].s >= goal) { showWin(players[curT].name); }
            }
            closeModal();
        }

        function showWin(name) {
            // لێرە مۆبایلەکە بە توندی دەلەرزێتەوە (Vibrate)
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 500]); 
            }
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            document.getElementById('winner-display').innerText = name;
            document.getElementById('win-overlay').style.display = 'flex';
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }

        setMode(2);
    </script>
</body>
</html>
