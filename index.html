<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خاڵژمێری ئاوێزە</title>
    <style>
        :root {
            --bg: #0a2e12;
            --card: rgba(255, 255, 255, 0.08);
            --gold: #ffd700;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1b5e20, #0a2e12);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .header h1 {
            color: var(--gold);
            margin: 10px 0;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .game-container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .team-card {
            flex: 1;
            background: var(--card);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* شوێنی ناو گۆڕین */
        .team-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--gold);
            margin-bottom: 15px;
            border: none;
            background: transparent;
            text-align: center;
            width: 100%;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .team-name:focus {
            border-bottom-color: var(--gold);
        }

        .score-display {
            font-size: 4rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--white);
        }

        /* بۆشایی خاڵ نووسین ڕاستەوخۆ لەسەر شاشە */
        .points-input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: var(--gold);
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        .points-input:focus {
            border-color: var(--gold);
        }

        .add-btn {
            width: 90%;
            padding: 12px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .reset-section {
            margin-top: 30px;
        }

        .reset-btn {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--white);
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.7;
        }

        /* پیرۆزبای ناوخۆیی */
        #win-msg {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--gold);
            color: #000;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            width: 80%;
        }

        #win-msg h2 { margin: 0; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>خاڵژمێری ئاوێزە 🀄</h1>
    </div>

    <div class="game-container">
        <div class="team-card">
            <input type="text" class="team-name" value="تیمی ١" onclick="this.select()">
            <div class="score-display" id="s1">0</div>
            <input type="number" id="in1" class="points-input" placeholder="خاڵ..." inputmode="numeric">
            <button class="add-btn" onclick="updateScore(1)">زیادکردن +</button>
        </div>

        <div class="team-card">
            <input type="text" class="team-name" value="تیمی ٢" onclick="this.select()">
            <div class="score-display" id="s2">0</div>
            <input type="number" id="in2" class="points-input" placeholder="خاڵ..." inputmode="numeric">
            <button class="add-btn" onclick="updateScore(2)">زیادکردن +</button>
        </div>
    </div>

    <div class="reset-section">
        <button class="reset-btn" onclick="resetAll()">🔄 دەستپێکردنەوەی یاری</button>
    </div>

    <div id="win-msg" onclick="this.style.display='none'">
        <h2 id="winner-text">پیرۆزە!</h2>
        <p>بۆ داخستن دەست لە شاشەکە بدە</p>
    </div>

    <script>
        let score1 = 0;
        let score2 = 0;

        function updateScore(team) {
            let input = document.getElementById('in' + team);
            let val = parseInt(input.value);

            if (!isNaN(val) && val !== 0) {
                if (team === 1) {
                    score1 = Math.max(0, score1 + val);
                    document.getElementById('s1').innerText = score1;
                    checkWin(score1, 1);
                } else {
                    score2 = Math.max(0, score2 + val);
                    document.getElementById('s2').innerText = score2;
                    checkWin(score2, 2);
                }
                input.value = ""; // پاککردنەوەی خانەکە دوای زیادکردن
            }
        }

        function checkWin(score, team) {
            if (score >= 101) {
                let name = document.querySelectorAll('.team-name')[team-1].value;
                document.getElementById('winner-text').innerHTML = "🏆 پیرۆزە!<br>" + name + " بردییەوە";
                document.getElementById('win-msg').style.display = "block";
                
                // لێدانی دەنگێکی سادە
                let context = new AudioContext();
                let osc = context.createOscillator();
                osc.type = "sine";
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.5);
            }
        }

        function resetAll() {
            score1 = 0; score2 = 0;
            document.getElementById('s1').innerText = "0";
            document.getElementById('s2').innerText = "0";
            document.querySelectorAll('.points-input').forEach(i => i.value = "");
        }
    </script>
</body>
</html>
