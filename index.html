<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵ ژمێری دۆمینە PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff0000; --neon: #39ff14; --dark: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background-color: #000; background-image: url('https://wallpaperaccess.com/full/2977045.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 45px 20px 15px 20px; background: rgba(0, 0, 0, 0.9); border-bottom: 3px solid var(--neon); z-index: 100; }
        .timer-wrapper { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05); padding: 6px 18px; border-radius: 50px; cursor: pointer; border: 1.5px solid var(--neon); box-shadow: 0 0 15px var(--neon); transition: 0.4s all; }
        #game-timer { font-family: monospace; font-size: 1.5rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:last-child { grid-column: 1 / span 2; width: 85%; margin: 0 auto; }
        .card { background: rgba(0, 0, 0, 0.85); border-radius: 30px; border: 3px solid var(--neon); padding: 20px; text-align: center; backdrop-filter: blur(20px); position: relative; }
        
        /* ستایلی پێشبینیکەر و جیاوازی */
        .prediction-tag { font-size: 0.75rem; color: var(--main); margin-top: 5px; font-weight: bold; }
        .gap-info { background: rgba(57, 255, 20, 0.1); color: var(--neon); padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; margin-top: 10px; display: inline-block; border: 0.5px solid var(--neon); }

        .player-input { background: none; border: none; color: var(--neon); text-align: center; width: 100%; font-weight: 900; font-size: 1.3rem; outline: none; }
        .score-total { font-size: 4.5rem; font-weight: 900; color: var(--neon); cursor: pointer; line-height: 1; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #000; width: 100%; max-width: 450px; padding: 25px; border-radius: 40px; border: 2.5px solid var(--neon); text-align: center; color: #fff; max-height: 85vh; overflow-y: auto; }
        
        .select-btn { padding: 12px; border-radius: 15px; border: 2px solid #444; background: #111; color: #fff; font-weight: bold; cursor: pointer; position: relative; margin-bottom: 5px; width: 100%; text-align: center; }
        .select-btn.active { border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .select-btn.active::after { content: '✅'; position: absolute; top: 2px; right: 8px; font-size: 0.8rem; }

        .folder { background: #111; border-radius: 15px; margin-bottom: 12px; border: 1px solid rgba(57,255,20,0.3); text-align: right; overflow: hidden; }
        .folder-head { padding: 15px; background: var(--neon); color: #000; font-weight: 900; display: flex; justify-content: space-between; cursor: pointer; }
        .folder-body { display: none; padding: 15px; background: #050505; color: #eee; }

        .btn { padding: 15px; border-radius: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-neon { background: var(--neon); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
    </style>
</head>
<body>

    <audio id="sound-hit" src="https://www.soundjay.com/button/sounds/button-20.mp3"></audio>
    <audio id="sound-win" src="https://www.myinstants.com/media/sounds/victory-sound-effect.mp3"></audio>

    <div class="header">
        <div onclick="openSettings()" style="font-size:1.8rem; cursor:pointer; color:var(--neon);">⚙️</div>
        <div class="timer-wrapper" id="timer-container" onclick="toggleTimer()">
            <span id="timer-icon" style="color:white;">⏸️</span>
            <span id="game-timer">00:00</span>
        </div>
        <div style="color:var(--neon); font-weight:900;">خاڵ ژمێری دۆمینە</div>
    </div>

    <div id="peak-msg" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:20000; background:rgba(0,0,0,0.9); padding:30px; border-radius:30px; border:3px solid #fff; text-align:center;">
        <h1 style="font-size:4rem;">🔥</h1><h2 style="color:#fff;">یارییەکە لە لوتکەدایە</h2>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="settings-panel" class="modal" style="justify-content: flex-start; overflow-y: auto;">
        <div class="modal-box" style="max-width:100%;">
            <h2 style="color:var(--neon); margin-bottom:20px;">ڕێکخستنەکان</h2>
            <div class="folder"><div class="folder-head" onclick="toggleF(this)"><span>👥 جۆری یاری</span><span>▼</span></div><div class="folder-body" id="mode-selectors"><div class="select-btn" id="btn-mode-2" onclick="confirmNewGame(2)">٢ نەفەری 👥</div><div class="select-btn" id="btn-mode-3" onclick="confirmNewGame(3)">٣ نەفەری 👤</div></div></div>
            <div class="folder"><div class="folder-head" onclick="toggleF(this)"><span>🎯 ئامانج (<span id="current-target-display">101</span>)</span><span>▼</span></div><div class="folder-body" style="text-align:center;"><div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;"><div class="select-btn target-item" data-val="100" onclick="setTarget(100, this)">100</div><div class="select-btn target-item" data-val="101" onclick="setTarget(101, this)">101</div><div class="select-btn target-item" data-val="150" onclick="setTarget(150, this)">150</div><div class="select-btn target-item" data-val="200" onclick="setTarget(200, this)">200</div></div></div></div>
            <div class="folder"><div class="folder-head" onclick="toggleF(this)"><span>🎨 باکگراوند</span><span>▼</span></div><div class="folder-body" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><div class="theme-item" style="height:70px; border:2px solid #444; border-radius:10px; background-image:url('https://wallpaperaccess.com/full/2977045.jpg'); background-size:cover;" onclick="changeTheme(this)"></div><div class="theme-item" style="height:70px; border:2px solid #444; border-radius:10px; background-image:url('https://images8.alphacoders.com/601/601596.jpg'); background-size:cover;" onclick="changeTheme(this)"></div></div></div>
            <div class="folder"><div class="folder-head" onclick="toggleF(this)"><span>📜 مێژوو</span><span>▼</span></div><div class="folder-body"><button class="btn btn-red" onclick="askClearHistory()">پاککردنەوە 🗑️</button><div id="history-content"></div></div></div>
            <button class="btn btn-red" onclick="closeSettings()">گەڕانەوە</button>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--neon);">تۆمارکردن</h2>
            <input type="number" id="points-input" onkeydown="if(event.key==='Enter') validateScore()" style="width:100%; font-size:5rem; background:none; border:none; border-bottom:4px solid var(--neon); color:var(--neon); text-align:center; outline:none; margin:20px 0;" placeholder="0" inputmode="numeric">
            <div id="confirm-box" style="display:none; border: 1.5px dashed var(--red); padding: 15px; border-radius: 20px; background: rgba(255,0,0,0.1); margin-bottom: 15px;">
                <p style="color:var(--red); font-weight:900;">⚠️ ئایا دڵنیایت؟</p>
                <div style="display:flex; gap:10px; margin-top:15px;"><button class="btn btn-neon" onclick="saveScore()">بەڵێ</button><button class="btn btn-red" onclick="closeModal()">نەخێر</button></div>
            </div>
            <div id="normal-btns" style="display:flex; gap:12px;"><button class="btn btn-red" onclick="closeModal()">لابردن</button><button class="btn btn-neon" onclick="validateScore()">تۆمارکردن</button></div>
        </div>
    </div>

    <div id="new-game-modal" class="modal"><div class="modal-box" style="border-color: var(--main);"><h1>🎮</h1><h2 style="color:var(--main);">یاری نوێ؟</h2><div style="display:flex; gap:12px;"><button class="btn btn-neon" id="confirm-new-btn">بەڵێ</button><button class="btn btn-red" onclick="document.getElementById('new-game-modal').style.display='none'">نەخێر</button></div></div></div>
    
    <div id="win-modal" class="modal"><div class="modal-box" style="border-color: var(--main);"><h1>🏆</h1><h1 id="winner-name"></h1><button class="btn btn-main" onclick="resetCurrentGame()">یاری نوێ 🔄</button></div></div>

    <script>
        let players = {}; let curT = 1; let seconds = 0; let timerInterval; let isPaused = false; let targetScore = 101;
        let savedNames = JSON.parse(localStorage.getItem('domino_names') || '[]');

        function playHit() { document.getElementById('sound-hit').currentTime = 0; document.getElementById('sound-hit').play(); }
        function playWin() { document.getElementById('sound-win').play(); }

        function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { if (!isPaused) { seconds++; updateTimerUI(); localStorage.setItem('domino_s', seconds); } }, 1000); }
        
        function updateTimerUI() { 
            let m = Math.floor(seconds/60), s = seconds%60, t = document.getElementById('game-timer');
            t.innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
            if(m===10 && s===0) { document.getElementById('peak-msg').style.display='block'; setTimeout(()=>document.getElementById('peak-msg').style.display='none',2000); }
            if(m>=5) c("#ff0000"); else if(m>=1) c("#ffff00"); else c("#39ff14");
        }
        function c(clr) { const t=document.getElementById('game-timer'), w=document.getElementById('timer-container'); t.style.color=clr; w.style.borderColor=clr; }

        function calculatePrediction() {
            let totalScores = Object.values(players).map(p => p.score);
            let total = totalScores.reduce((a, b) => a + b, 0);
            if (total === 0) return Object.keys(players).map(() => "ئەگەر: 50%");
            return Object.values(players).map(p => `ئەگەری بردنەوە: ${Math.round((p.score / total) * 100)}%`);
        }

        function getGapInfo() {
            let sorted = Object.values(players).sort((a, b) => b.score - a.score);
            if (sorted.length < 2 || sorted[0].score === sorted[1].score) return "خاڵەکان یەکسانن";
            return `${sorted[0].name.split(' ')[0]} بە ${sorted[0].score - sorted[1].score} خاڵ لەپێشە`;
        }

        function setTarget(v, el) { targetScore=parseInt(v); localStorage.setItem('domino_target',v); document.getElementById('current-target-display').innerText=v; render(); }
        
        function setMode(n, isNew = false) {
            targetScore = parseInt(localStorage.getItem('domino_target')) || 101;
            if(isNew) { 
                players={}; seconds=0; 
                for(let i=1; i<=n; i++) players[i] = { name:(n==2?`تیمی ${i} 👨`:`یاریزان ${i} 👨`), score:0, history:[] }; 
                saveState(); 
            } else { 
                players=JSON.parse(localStorage.getItem('domino_g')) || {}; seconds=parseInt(localStorage.getItem('domino_s'))||0; 
            }
            render(); startTimer();
        }

        function render() {
            const grid = document.getElementById('main-grid'); 
            const predictions = calculatePrediction();
            const gapText = getGapInfo();
            grid.innerHTML = "";
            let idx = 0;
            for (let i in players) {
                grid.innerHTML += `<div class="card">
                <input type="text" list="names-list" class="player-input" value="${players[i].name}" onchange="players[${i}].name=this.value; saveName(this.value); saveState(); render();">
                <div class="prediction-tag">${predictions[idx]}</div>
                <div class="score-total" onclick="curT=${i}; document.getElementById('score-modal').style.display='flex';">${players[i].score}</div>
                <div style="font-size:0.8rem; color:#aaa;">ماوە: ${targetScore - players[i].score}</div>
                <div class="gap-info">${gapText}</div>
                <div style="display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:10px;">
                ${players[i].history.map((pt, j) => `<div style="background:var(--neon); color:#000; padding:2px 8px; border-radius:8px; font-weight:bold;">${pt} <span onclick="players[${i}].score-=${pt}; players[${i}].history.splice(${j},1); saveState(); render();" style="color:red">×</span></div>`).join("")}</div></div>`;
                idx++;
            }
            updateDatalist();
        }

        function saveName(name) {
            if (!savedNames.includes(name) && name.length > 2) {
                savedNames.push(name);
                localStorage.setItem('domino_names', JSON.stringify(savedNames));
            }
        }

        function updateDatalist() {
            let dl = document.getElementById('names-list');
            if(!dl) {
                dl = document.createElement('datalist');
                dl.id = 'names-list';
                document.body.appendChild(dl);
            }
            dl.innerHTML = savedNames.map(n => `<option value="${n}">`).join("");
        }

        function validateScore() { 
            let v=parseInt(document.getElementById('points-input').value); 
            if(v>=40) document.getElementById('confirm-box').style.display='block'; else saveScore(); 
        }

        function saveScore() {
            let v=parseInt(document.getElementById('points-input').value);
            players[curT].score+=v; players[curT].history.push(v);
            playHit(); saveState(); render(); closeModal();
            if(players[curT].score>=targetScore) { playWin(); confetti(); document.getElementById('winner-name').innerText="👑 "+players[curT].name; document.getElementById('win-modal').style.display='flex'; }
        }

        function saveState() { localStorage.setItem('domino_g', JSON.stringify(players)); }
        function toggleTimer() { isPaused = !isPaused; }
        function closeModal() { document.getElementById('score-modal').style.display='none'; document.getElementById('confirm-box').style.display='none'; }
        function openSettings() { document.getElementById('settings-panel').style.display='flex'; }
        function closeSettings() { document.getElementById('settings-panel').style.display='none'; }
        function toggleF(h) { let b=h.nextElementSibling; b.style.display=(b.style.display=='block'?'none':'block'); }
        function changeTheme(el) { document.body.style.backgroundImage=el.style.backgroundImage; }
        function confirmNewGame(n) { document.getElementById('new-game-modal').style.display='flex'; document.getElementById('confirm-new-btn').onclick=()=>{ setMode(n, true); document.getElementById('new-game-modal').style.display='none'; }; }
        function resetCurrentGame() { location.reload(); }

        window.onload = () => { setMode(localStorage.getItem('domino_g')?Object.keys(JSON.parse(localStorage.getItem('domino_g'))).length:2); };
    </script>
</body>
</html>
