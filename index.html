<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000 radial-gradient(circle at center, #700 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* شاشەی پیرۆزبایی گەرم و گوڕ */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }
        .win-box h1 { font-size: 3.5rem; color: #efbf3b; margin-bottom: 10px; text-shadow: 0 0 20px rgba(239,191,59,0.6); }
        .win-box h2 { font-size: 2.2rem; color: #fff; margin-bottom: 30px; }

        /* مێنۆی سەرەوە و ڕێکخستن */
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.6); align-items: center; border-bottom: 1px solid #400; }
        .goal-input { background: #111; border: 1px solid #efbf3b; color: #efbf3b; width: 70px; text-align: center; border-radius: 8px; padding: 5px; font-weight: bold; font-size: 1.1rem; }

        /* کارتەکان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 75%; margin: 0 auto; }

        .card { background: rgba(255,255,255,0.06); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-header { background: #900; padding: 12px; text-align: center; border-radius: 25px 25px 0 0; }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; font-size: 1.2rem; }
        
        .score-total { font-size: 3.5rem; font-weight: 900; text-align: center; margin: 10px 0; letter-spacing: -2px; }
        
        /* مێژووی خاڵەکان بە فۆنتی گەورە */
        .history-list { height: 160px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); }
        .hist-item { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); font-size: 1.4rem; font-weight: bold; }
        .btn-del { color: #ff5252; font-size: 1.6rem; cursor: pointer; }

        /* دوگمەی زیادکردن (+) */
        .plus-btn { font-size: 2.5rem; color: #efbf3b; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .plus-btn:active { transform: scale(1.3); }

        /* مۆداڵەکان */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 88%; padding: 30px; border-radius: 30px; border: 2px solid #900; text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid #900; color: #fff; font-size: 5rem; text-align: center; outline: none; margin: 20px 0; }

        /* ڕێکخستنی سۆشیاڵ */
        #settings-modal a { display: block; color: #fff; text-decoration: none; padding: 15px; margin: 10px; background: #222; border-radius: 15px; font-weight: bold; }

        .footer { padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); }
        .restart { background: #b00; color: #fff; border: none; padding: 12px 25px; border-radius: 15px; font-weight: bold; }
        .mode-btn { background: #333; border: none; color: #fff; padding: 8px 15px; border-radius: 10px; font-size: 0.9rem; }
        .active-mode { background: #efbf3b; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="win-overlay" onclick="location.reload()">
        <div class="win-box">
            <h1>🏆 پیرۆزە!</h1>
            <h2 id="winner-display">تیمی ١</h2>
            <h2 style="color:#efbf3b">تۆ دۆمینەزانی یارییەکەیت!</h2>
            <button style="margin-top:30px; background:#efbf3b; color:#000; border:none; padding:15px 40px; border-radius:20px; font-weight:bold; font-size:1.3rem;">یارییەکی نوێ 🔄</button>
        </div>
    </div>

    <div id="exit-modal" class="modal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">ئایا دڵنیای بۆ دەرچوون لە خاڵژمێری دۆمینە؟</h2>
            <div style="display:flex; gap:15px;">
                <button onclick="window.close()" style="flex:1; background:#b00; color:#fff; padding:15px; border-radius:15px; border:none; font-weight:bold;">بەڵێ، دەرچوون</button>
                <button onclick="document.getElementById('exit-modal').style.display='none'" style="flex:1; background:#444; color:#fff; padding:15px; border-radius:15px; border:none;">نەخێر</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box">
            <h2 style="color:#efbf3b; margin-bottom:20px;">📱 سۆشیاڵ میدیای ئاوێزە PC</h2>
            <a href="https://facebook.com/awezapc">فەیسبووکی ئاوێزە PC</a>
            <a href="https://tiktok.com/@awezapc">تیکتۆکی ئاوێزە PC</a>
            <button onclick="document.getElementById('settings-modal').style.display='none'" style="margin-top:20px; background:#444; color:#fff; padding:10px 30px; border-radius:10px; border:none;">داخستن</button>
        </div>
    </div>

    <div class="top-nav">
        <div onclick="document.getElementById('settings-modal').style.display='flex'" style="font-size:1.5rem; cursor:pointer;">⚙️ ڕێکخستن</div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" class="goal-input" value="101" onchange="updateGoal()"></div>
        <div>
            <button class="mode-btn active-mode" id="btn-2" onclick="setMode(2)">٢ نەفەری</button>
            <button class="mode-btn" id="btn-3" onclick="setMode(3)">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:#efbf3b;">ناو</h2>
            <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            <div style="display:flex; gap:15px;">
                <button onclick="closeModal()" style="flex:1; background:#444; color:#fff; border:none; padding:18px; border-radius:15px; font-weight:bold;">پاشگەزبوونەوە</button>
                <button onclick="addScore()" style="flex:1; background:#b00; color:#fff; border:none; padding:18px; border-radius:15px; font-weight:bold;">تەواو OK</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="restart" onclick="if(confirm('دڵنیای لە دەستپێکردنەوە؟')) location.reload()">دەستپێکردنەوە</button>
        <button style="background:#fff; color:#000; border:none; padding:10px 25px; border-radius:15px; font-weight:bold;">Aweza PC</button>
    </div>

    <script>
        // مامەڵەکردن لەگەڵ دوگمەی گەڕانەوەی مۆبایل
        window.addEventListener('popstate', function(event) {
            document.getElementById('exit-modal').style.display = 'flex';
            history.pushState(null, null, window.location.pathname);
        });
        history.pushState(null, null, window.location.pathname);

        let curT = 0; let goal = 101;
        let players = {};

        function setMode(n) {
            players = {};
            const grid = document.getElementById('main-grid');
            if(n === 3) grid.classList.add('grid-3'); else grid.classList.remove('grid-3');
            for(let i=1; i<=n; i++) { players[i] = { name: (i==1?'ماڵەوە':(i==2?'میوان':'میوان ١')), s: 0, h: [] }; }
            document.getElementById('btn-2').className = (n==2 ? 'mode-btn active-mode' : 'mode-btn');
            document.getElementById('btn-3').className = (n==3 ? 'mode-btn active-mode' : 'mode-btn');
            renderAll();
        }

        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <div class="plus-btn" onclick="openModal(${i})">+</div>
                        </div>
                        <div class="score-total">${players[i].s} <span style="font-size:1rem; color:#888;">/${goal}</span></div>
                        <div class="history-list">
                            ${players[i].h.map((val, idx) => `
                                <div class="hist-item">
                                    <span style="color:#555">${idx+1}</span>
                                    <span>${val}</span>
                                    <span class="btn-del" onclick="delScore(${i}, ${idx})">×</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function openModal(t) { curT = t; document.getElementById('modal-title').innerText = players[t].name; document.getElementById('points-input').value = ""; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }

        function addScore() {
            let val = parseInt(document.getElementById('points-input').value);
            if (!isNaN(val) && val !== 0) {
                players[curT].s += val;
                players[curT].h.push(val);
                renderAll();
                if(players[curT].s >= goal) { showWin(players[curT].name); }
            }
            closeModal();
        }

        function showWin(name) {
            if (navigator.vibrate) navigator.vibrate([1000, 300, 1000]); 
            confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });
            document.getElementById('winner-display').innerText = name;
            document.getElementById('win-overlay').style.display = 'flex';
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }

        setMode(2);
    </script>
</body>
</html>
