<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خاڵژمێری ئاوێزە</title>
    <style>
        :root {
            --primary: #2e7d32;
            --gold: #ffd700;
            --dark: #1b1b1b;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2e7d32 0%, #1b5e20 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 5px 0;
        }

        /* ستایلی تیمەکان و ناو گۆڕین */
        .game-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .team-box {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ئێرە گرنگە بۆ ناو گۆڕین بە دەست لێدان */
        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--gold);
            padding: 5px;
            border-bottom: 1px dashed var(--gold);
            cursor: pointer;
            margin-bottom: 10px;
            outline: none;
        }

        .team-name:focus {
            background: rgba(255,215,0,0.2);
            border-radius: 5px;
        }

        .score {
            font-size: 3.5rem;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add { background-color: var(--gold); color: var(--dark); }
        .btn-sub { background-color: #ff5252; color: white; }
        .btn-reset { 
            margin-top: 30px; 
            background: white; 
            color: var(--dark); 
            padding: 15px 40px;
            font-size: 1rem;
        }

        /* پیرۆزبای و ئەنیمەیشن */
        #winner-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-text {
            font-size: 2.5rem;
            color: var(--gold);
            text-align: center;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>خاڵژمێری ئاوێزە</h1>
        <small>بۆ ناو گۆڕین، دەست لە ناوی تیمەکە بدە</small>
    </div>

    <div class="game-container">
        <div class="team-box">
            <div class="team-name" contenteditable="true" id="name1">تیمی ١</div>
            <div class="score" id="score1">0</div>
            <div class="btn-group">
                <button class="btn-add" onclick="addScore(1, 1)">+1</button>
                <button class="btn-add" onclick="addScore(1, 5)">+5</button>
                <button class="btn-sub" onclick="addScore(1, -1)">-1</button>
                <button class="btn-add" onclick="customAdd(1)">+</button>
            </div>
        </div>

        <div class="team-box">
            <div class="team-name" contenteditable="true" id="name2">تیمی ٢</div>
            <div class="score" id="score2">0</div>
            <div class="btn-group">
                <button class="btn-add" onclick="addScore(2, 1)">+1</button>
                <button class="btn-add" onclick="addScore(2, 5)">+5</button>
                <button class="btn-sub" onclick="addScore(2, -1)">-1</button>
                <button class="btn-add" onclick="customAdd(2)">+</button>
            </div>
        </div>
    </div>

    <button class="btn-reset" onclick="resetGame()">یاری نوێ 🔄</button>

    <div id="winner-overlay" onclick="this.style.display='none'">
        <div class="winner-text" id="winner-msg">پیرۆزە!</div>
        <p>بۆ گەڕانەوە دەست لە شاشەکە بدە</p>
    </div>

    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

    <script>
        let s1 = 0, s2 = 0;
        const winLimit = 101; // دەتوانیت بیگۆڕیت

        function addScore(team, val) {
            if (team === 1) {
                s1 = Math.max(0, s1 + val);
                document.getElementById('score1').innerText = s1;
                checkWinner(s1, document.getElementById('name1').innerText);
            } else {
                s2 = Math.max(0, s2 + val);
                document.getElementById('score2').innerText = s2;
                checkWinner(s2, document.getElementById('name2').innerText);
            }
        }

        function customAdd(team) {
            let p = prompt("چەند خاڵ زیاد دەکەیت؟");
            if (p) addScore(team, parseInt(p));
        }

        function checkWinner(score, name) {
            if (score >= winLimit) {
                document.getElementById('winner-msg').innerHTML = "🏆 پیرۆزبای بۆ <br>" + name;
                document.getElementById('winner-overlay').style.display = 'flex';
                document.getElementById('winSound').play();
            }
        }

        function resetGame() {
            s1 = 0; s2 = 0;
            document.getElementById('score1').innerText = 0;
            document.getElementById('score2').innerText = 0;
        }
    </script>
</body>
</html>
