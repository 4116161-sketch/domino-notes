<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: #000 radial-gradient(circle at center, #600 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* شاشەی پیرۆزبایی */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        /* سەرەوە */
        .top-nav { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.6); align-items: center; border-bottom: 1px solid #400; }
        .goal-input { background: #111; border: 1px solid #efbf3b; color: #efbf3b; width: 60px; text-align: center; border-radius: 5px; font-weight: bold; }

        /* کارتە بچووکەکان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 70%; margin: 0 auto; }

        .card { background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .card-header { background: #800; padding: 6px; text-align: center; border-radius: 15px 15px 0 0; }
        .p-name { font-weight: bold; color: #fff; font-size: 0.9rem; }
        
        .score-total { font-size: 2.8rem; font-weight: bold; text-align: center; margin: 5px 0; }
        
        /* مێژووی خاڵەکان (بۆشایی کەم) */
        .history-list { height: 130px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .hist-item { display: flex; justify-content: space-between; padding: 6px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.3rem; font-weight: bold; }
        .btn-del { color: #ff5252; cursor: pointer; }
        .plus-btn { font-size: 2rem; color: #efbf3b; cursor: pointer; font-weight: bold; margin-top: 2px; }

        /* پەنجەرەی خاڵ (Popup) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; padding: 25px; border-radius: 20px; border: 2px solid #800; text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 3px solid #800; color: #fff; font-size: 4rem; text-align: center; outline: none; margin: 15px 0; }

        /* ئەرشیف */
        #archive-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 6000; padding: 20px; flex-direction: column; }
        .archive-item { background: #1a1a1a; margin-bottom: 8px; padding: 12px; border-radius: 10px; border-right: 4px solid #efbf3b; }

        .mode-btn { background: #222; border: none; color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="win-overlay" onclick="location.reload()">
        <div style="text-align: center;">
            <h1 style="font-size: 4rem;">🏆</h1>
            <h2 id="winner-display" style="font-size: 2rem; margin: 15px 0;">ناو</h2>
            <p>پیرۆزە دۆمینەزان!</p>
            <button style="margin-top:30px; background:#efbf3b; color:#000; border:none; padding:12px 30px; border-radius:15px; font-weight:bold;">یاری نوێ</button>
        </div>
    </div>

    <div id="archive-modal">
        <h2 style="color:#efbf3b; text-align:center; margin-bottom:15px;">📂 فۆڵدەری ئەرشیف</h2>
        <div id="archive-list" style="overflow-y:auto; flex:1;"></div>
        <button onclick="document.getElementById('archive-modal').style.display='none'" style="background:#444; color:#fff; padding:12px; border-radius:10px; border:none; margin-top:10px;">داخستن</button>
    </div>

    <div class="top-nav">
        <div onclick="showArchive()" style="cursor:pointer; font-weight:bold; font-size:0.9rem;">⚙️ ڕێکخستن</div>
        <div style="font-size:0.9rem;">ئامانج: <input type="number" id="goal-val" class="goal-input" value="101" onchange="updateGoal()"></div>
        <div>
            <button class="mode-btn" id="btn-2" onclick="setMode(2)">٢ نەفەری</button>
            <button class="mode-btn" id="btn-3" onclick="setMode(3)">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:#efbf3b; font-size:1.2rem;">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric" autofocus>
            </form>
            <p style="color:#666; font-size:0.8rem;">بۆ تۆمارکردن 'Enter' دابگرە</p>
        </div>
    </div>

    <script>
        let curT = 0; let goal = 101;
        let players = {};

        function setMode(n) {
            players = {};
            const grid = document.getElementById('main-grid');
            if(n === 3) grid.classList.add('grid-3'); else grid.classList.remove('grid-3');
            
            for(let i=1; i<=n; i++) { 
                let name;
                if(n == 2) {
                    name = (i==1 ? "تیمی یەکەم 👨" : "تیمی دووەم 👨");
                } else {
                    name = (i==1 ? "کەسی یەکەم 👨" : i==2 ? "کەسی دووەم 👨" : "کەسی سێیەم 👨");
                }
                players[i] = { name: name, s: 0, h: [] }; 
            }
            document.getElementById('btn-2').style.background = (n==2 ? '#800' : '#222');
            document.getElementById('btn-3').style.background = (n==3 ? '#800' : '#222');
            renderAll();
        }

        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        function renderAll() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <span class="p-name">${players[i].name}</span><br>
                            <div class="plus-btn" onclick="openModal(${i})">+</div>
                        </div>
                        <div class="score-total">${players[i].s} <span style="font-size:0.8rem; color:#888;">/${goal}</span></div>
                        <div class="history-list">
                            ${players[i].h.map((val, idx) => `
                                <div class="hist-item">
                                    <span style="color:#444">${idx+1}</span>
                                    <span>${val}</span>
                                    <span class="btn-del" onclick="delScore(${i}, ${idx})">×</span>
                                </div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        function openModal(t) { 
            curT = t; 
            document.getElementById('modal-title').innerText = players[t].name; 
            document.getElementById('points-input').value = ""; 
            document.getElementById('score-modal').style.display = 'flex'; 
            document.getElementById('points-input').focus(); 
        }

        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }

        function addScore() {
            let val = parseInt(document.getElementById('points-input').value);
            if (!isNaN(val) && val !== 0) {
                players[curT].s += val;
                players[curT].h.push(val);
                renderAll();
                if(players[curT].s >= goal) { showWin(players[curT].name); }
            }
            closeModal();
        }

        function showWin(name) {
            saveToArchive(name);
            if (navigator.vibrate) navigator.vibrate([800, 200, 800]); 
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            document.getElementById('winner-display').innerText = name;
            document.getElementById('win-overlay').style.display = 'flex';
        }

        function saveToArchive(winner) {
            let arch = JSON.parse(localStorage.getItem('d_arch') || '[]');
            arch.unshift({ date: new Date().toLocaleDateString('ku-IQ'), winner: winner });
            localStorage.setItem('d_arch', JSON.stringify(arch));
        }

        function showArchive() {
            const list = document.getElementById('archive-list');
            const arch = JSON.parse(localStorage.getItem('d_arch') || '[]');
            list.innerHTML = arch.length ? "" : "<p style='text-align:center;color:#444'>خاڵی پارێزراو نییە</p>";
            arch.forEach(i => {
                list.innerHTML += `<div class="archive-item"><small>📅 ${i.date}</small><br>🏆 <b>${i.winner}</b></div>`;
            });
            document.getElementById('archive-modal').style.display = 'flex';
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }

        setMode(2);
    </script>
</body>
</html>
