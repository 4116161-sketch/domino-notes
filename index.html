<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە - ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --bg: #000; --card-bg: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s;
        }

        /* مێنۆی ڕێکخستن */
        #settings-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 8000; flex-direction: column; padding: 25px; overflow-y: auto;
        }
        .set-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .theme-btn { 
            padding: 10px; border-radius: 12px; border: 1px solid #444; color: #fff; 
            font-size: 0.8rem; text-align: center; cursor: pointer; background: #111;
        }

        /* لۆگۆ */
        .logo-header { text-align: center; padding: 15px 10px 5px; }
        .logo-text { font-size: 2.2rem; font-weight: 900; color: var(--main); text-shadow: 0 0 15px rgba(239,191,59,0.4); letter-spacing: 2px; }

        /* سەرەوە */
        .top-nav { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer-box { display: flex; align-items: center; gap: 8px; background: #000; padding: 6px 15px; border-radius: 12px; border: 1px solid #333; }
        #game-timer { font-family: monospace; color: var(--main); font-weight: bold; font-size: 1.2rem; }
        .paused { color: #f55 !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* کارتەکان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; flex: 1; align-content: start; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 80%; margin: 0 auto; }
        .card { background: var(--card-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding-bottom: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-header { background: rgba(255,255,255,0.05); padding: 12px; text-align: center; border-radius: 25px 25px 0 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-name-input { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; font-size: 1.1rem; }
        
        .score-total { font-size: 3.8rem; font-weight: 900; text-align: center; margin: 10px 0; color: #fff; }
        .history-list { height: 140px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .hist-item { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 1.6rem; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; }
        .modal-box { background: #000; width: 85%; padding: 35px; border-radius: 30px; border: 2px solid var(--main); text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid var(--main); color: #fff; font-size: 5.5rem; text-align: center; outline: none; margin: 20px 0; }

        .btn { background: var(--main); color: #000; border: none; padding: 12px 30px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body id="app-body">

    <div id="settings-panel">
        <h2 style="color:var(--main); text-align:center; margin-bottom:25px;">⚙️ ستایلی دۆمینە</h2>
        <div class="set-card">
            <p>🀄 ٥ ستایلی جیاوازی دۆمینە هەڵبژێرە:</p>
            <div class="theme-grid">
                <div class="theme-btn" onclick="changeStyle('#000', '#efbf3b', 'rgba(255,255,255,0.08)')">ڕەشی زێڕین</div>
                <div class="theme-btn" onclick="changeStyle('#400', '#fff', 'rgba(255,255,255,0.12)')">سووری کلاسیک</div>
                <div class="theme-btn" onclick="changeStyle('#1a1a1a', '#00d2ff', 'rgba(0,210,255,0.1)')">شینی مۆدێرن</div>
                <div class="theme-btn" onclick="changeStyle('#002b11', '#00ff88', 'rgba(0,255,136,0.1)')">دۆمینەی سەوز</div>
                <div class="theme-btn" onclick="changeStyle('#2b002b', '#ff00ff', 'rgba(255,0,255,0.1)')">ستایلی مۆر</div>
            </div>
        </div>
        <div class="set-card">
            <p>📂 مێژووی یارییەکان</p>
            <div id="archive-list" style="max-height:150px; overflow-y:auto; margin-top:10px; font-size:0.9rem;"></div>
        </div>
        <button class="btn" onclick="document.getElementById('settings-panel').style.display='none'" style="width:100%;">داخستن</button>
    </div>

    <div class="logo-header">
        <div class="logo-text">AWEZA PC</div>
    </div>

    <div class="top-nav">
        <div onclick="document.getElementById('settings-panel').style.display='flex'; loadArchive();" style="font-size:2rem; cursor:pointer;">⚙️</div>
        <div class="timer-box">
            <span id="game-timer">00:00</span>
            <span id="pause-btn" onclick="toggleTimer()" style="cursor:pointer; margin-right:8px;">⏸️</span>
        </div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" value="101" onchange="updateGoal()" style="background:#111; color:var(--main); border:1px solid #333; width:55px; text-align:center; border-radius:8px; padding:2px;"></div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            </form>
            <p id="err-msg" style="color:#f55; display:none; font-weight:bold; margin-top:10px;">⚠️ خاڵێکی نایاسایی (١٠١)</p>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size:6rem;">🏆</h1>
        <h2 id="winner-display" style="font-size:3rem; color:var(--main); margin:20px 0;">ناو</h2>
        <p id="time-res" style="color:#888; margin-bottom:30px; font-size:1.2rem;"></p>
        <button class="btn" style="padding:15px 60px; font-size:1.5rem;">یاری نوێ 🔄</button>
    </div>

    <script>
        let curT = 0, goal = 101, players = {}, seconds = 0, timerInterval, isPaused = false;

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️" : "⏸️";
            document.getElementById('game-timer').classList.toggle('paused', isPaused);
        }

        // ٥ ستایلی جیاواز بۆ دۆمینە
        function changeStyle(bgColor, mainColor, cardColor) {
            document.body.style.backgroundColor = bgColor;
            document.documentElement.style.setProperty('--main', mainColor);
            document.querySelectorAll('.card').forEach(c => c.style.backgroundColor = cardColor);
        }

        function startTimer() {
            if(timerInterval) return;
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('game-timer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) { 
                let name = (n==2)?(i==1?"👨 تیمی یەکەم":"👨 تیمی دووەم"):(i==1?"👨 کەسی یەکەم":i==2?"👨 کەسی دووەم":"👨 کەسی سێیەم");
                players[i] = { name: name, s: 0, h: [] }; 
            }
            renderAll(); startTimer();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name-input" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <span onclick="openModal(${i})" style="font-size:2.5rem; cursor:pointer; color:var(--main); font-weight:bold; display:block; margin-top:5px;">+</span>
                        </div>
                        <div class="score-total">${players[i].s} <span style="font-size:0.9rem; color:rgba(255,255,255,0.2);">/${goal}</span></div>
                        <div class="history-list">${players[i].h.map((v, idx) => `<div class="hist-item"><span style="color:rgba(255,255,255,0.1)">${idx+1}</span><span>${v}</span><span onclick="delScore(${i},${idx})" style="color:#f55;">×</span></div>`).join('')}</div>
                    </div>`;
            }
        }

        function openModal(t) { 
            curT = t; document.getElementById('modal-title').innerText = players[t].name; 
            document.getElementById('points-input').value = ""; document.getElementById('err-msg').style.display = 'none';
            document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); 
        }

        function addScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (v === 101) { document.getElementById('err-msg').style.display = 'block'; return; }
            if (!isNaN(v) && v !== 0) {
                players[curT].s += v; players[curT].h.push(v); renderAll();
                if(players[curT].s >= goal) {
                    clearInterval(timerInterval);
                    confetti({ particleCount: 300, spread: 80, origin: { y: 0.6 } });
                    document.getElementById('winner-display').innerText = players[curT].name;
                    document.getElementById('time-res').innerText = "کاتی یاری: " + document.getElementById('game-timer').innerText;
                    document.getElementById('win-overlay').style.display = 'flex';
                    let h = JSON.parse(localStorage.getItem('dom_final_h') || '[]');
                    h.unshift({ d: new Date().toLocaleDateString('ku-IQ'), w: players[curT].name });
                    localStorage.setItem('dom_final_h', JSON.stringify(h));
                }
            }
            document.getElementById('score-modal').style.display = 'none';
        }

        function loadArchive() {
            let h = JSON.parse(localStorage.getItem('dom_final_h') || '[]');
            document.getElementById('archive-list').innerHTML = h.map(i => `<div style="padding:8px; border-bottom:1px solid rgba(255,255,255,0.05)">📅 ${i.d} - 🏆 ${i.w}</div>`).join('') || "مێژوو نییە";
        }

        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }
        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        setMode(2);
    </script>
</body>
</html>
