<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵ ژمێری دۆمینە</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff0000; --neon: #39ff14; --dark: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            background-image: url('https://wallpaperaccess.com/full/2977045.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* بەشی سەرەوە */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 45px 20px 15px 20px; background: rgba(0, 0, 0, 0.9); 
            border-bottom: 3px solid var(--neon); z-index: 100;
            box-shadow: 0 5px 20px rgba(57, 255, 20, 0.3);
        }

        .timer-wrapper { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(57, 255, 20, 0.1); padding: 6px 18px; border-radius: 50px; 
            cursor: pointer; border: 1.5px solid var(--neon); box-shadow: 0 0 15px var(--neon); 
        }
        #game-timer { font-family: monospace; font-size: 1.5rem; font-weight: 900; color: var(--neon); text-shadow: 0 0 8px var(--neon); }

        .paused .timer-wrapper { border-color: var(--red); box-shadow: 0 0 20px var(--red); animation: blinker 1s linear infinite; }
        .paused #game-timer { color: var(--red); text-shadow: 0 0 10px var(--red); }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* دیزاینی کارتەکان زۆر زۆر جوان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:last-child { grid-column: 1 / span 2; width: 85%; margin: 0 auto; }
        
        .card { 
            background: rgba(0, 0, 0, 0.85); border-radius: 30px; border: 3px solid var(--neon); 
            padding: 20px; text-align: center; backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(57, 255, 20, 0.1);
            transition: 0.3s transform;
        }
        .card:active { transform: scale(0.98); }

        .player-input { background: none; border: none; color: var(--neon); text-align: center; width: 100%; font-weight: 900; font-size: 1.4rem; outline: none; text-shadow: 0 0 5px var(--neon); }
        .score-total { font-size: 4.5rem; font-weight: 900; color: var(--neon); cursor: pointer; line-height: 1; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        .rem-pts { color: #fff; font-size: 0.9rem; margin-bottom: 12px; font-weight: bold; opacity: 0.9; }

        .history-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; border-top: 1.5px solid rgba(57,255,20,0.4); padding-top: 12px; }
        .history-item { background: var(--neon); color: #000; padding: 4px 12px; border-radius: 12px; font-size: 0.9rem; font-weight: 900; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* مۆداڵەکان */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #000; width: 100%; max-width: 450px; padding: 35px; border-radius: 40px; border: 2.5px solid var(--neon); text-align: center; color: #fff; }

        /* شاشەی پیرۆزبایی شاهانە */
        .win-box { 
            background: #000; border: 4px solid var(--main); padding: 50px 20px; border-radius: 50px; 
            text-align: center; width: 95%; max-width: 420px; color: #fff;
            box-shadow: 0 0 70px rgba(239, 191, 59, 0.6);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn { padding: 16px; border-radius: 20px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.2rem; margin-top: 15px; transition: 0.3s; }
        .btn-neon { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-red { background: var(--red); color: #fff; box-shadow: 0 0 15px var(--red); }
        .btn-main { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
    </style>
</head>
<body>

    <div class="header" id="header-area">
        <div onclick="openSettings()" style="font-size:1.8rem; cursor:pointer; color:var(--neon);">⚙️</div>
        <div class="timer-wrapper" id="timer-container" onclick="toggleTimer()">
            <span id="timer-icon" style="color:white;">⏸️</span>
            <span id="game-timer">00:00</span>
        </div>
        <div style="color:var(--neon); font-weight:900; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon);">خاڵ ژمێری دۆمینە</div>
    </div>

    <div style="display:flex; justify-content:center; gap:12px; padding:15px;">
        <button onclick="setMode(2)" style="background:var(--neon); color:#000; border:none; padding:10px 30px; border-radius:15px; font-weight:900;">٢ نەفەری</button>
        <button onclick="setMode(3)" style="background:rgba(57, 255, 20, 0.1); color:var(--neon); border:1.5px solid var(--neon); padding:10px 30px; border-radius:15px; font-weight:900;">٣ نەفەری</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--neon); margin-bottom: 10px;">تۆمارکردن</h2>
            <input type="number" id="points-input" style="width:100%; font-size:5.5rem; background:none; border:none; border-bottom:5px solid var(--neon); color:var(--neon); text-align:center; outline:none; margin:20px 0; text-shadow: 0 0 15px var(--neon);" placeholder="0" inputmode="numeric">
            
            <div id="confirm-box" style="display:none; margin-bottom:20px;">
                <p style="color:var(--red); font-weight:900; font-size:1.4rem; line-height: 1.4;">⚠️ ئەم خاڵە زۆرە، ئایا دڵنیایت؟</p>
                <div style="display:flex; gap:15px; margin-top:20px;">
                    <button class="btn btn-neon" onclick="saveScore()">بەڵێ</button>
                    <button class="btn btn-red" onclick="closeModal()">نەخێر</button>
                </div>
            </div>

            <div id="normal-btns" style="display:flex; gap:15px;">
                <button class="btn btn-red" onclick="closeModal()">لابردن</button>
                <button class="btn btn-neon" onclick="validateScore()">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <div id="illegal-modal" class="modal">
        <div class="modal-box" style="border-color: var(--red); border-width: 4px; animation: shake 0.4s ease-in-out; max-width: 90%;">
            <h1 style="font-size: 6rem; margin-bottom: 10px;">⛔</h1>
            <h2 id="illegal-text" style="color:var(--red); font-size: 2.5rem; text-shadow: 0 0 15px var(--red); line-height: 1.3;"></h2>
            <p style="margin-top:20px; font-size: 1.2rem; color: #ccc;">تکایە نمرەکە ڕاست بکەرەوە، ئەم نمرەیە بە یەک جار تۆمار ناکرێت!</p>
            <button class="btn btn-red" style="font-size: 1.5rem; margin-top: 30px;" onclick="document.getElementById('illegal-modal').style.display='none'">تێگەیشتم (لابردن)</button>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="win-box">
            <h1 style="font-size: 7rem; filter: drop-shadow(0 0 20px var(--main));">🏆</h1>
            <h1 style="color:var(--main); font-size: 3.5rem; text-shadow: 0 0 25px var(--main); margin: 10px 0;">پیرۆزبێت!</h1>
            <h2 id="winner-name" style="font-size: 2.5rem; margin: 15px 0; color: #fff; text-shadow: 0 0 10px #fff;"></h2>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; border: 1px solid rgba(239,191,59,0.3); margin-bottom: 25px;">
                <p id="winner-stats" style="color:#ddd; font-size: 1.3rem; font-weight: bold;"></p>
            </div>
            <button class="btn btn-main" style="font-size: 1.5rem;" onclick="location.reload()">یاری نوێ 🔄</button>
        </div>
    </div>

    <div id="settings-panel" class="modal" style="justify-content: flex-start;">
        <div class="modal-box" style="max-width:100%; border-radius: 0 0 40px 40px;">
            <h2 style="color:var(--neon); margin-bottom:20px;">📜 مێژووی یارییەکان</h2>
            <div id="history-content" style="text-align: right;"></div>
            <button class="btn btn-red" onclick="closeSettings()">گەڕانەوە</button>
        </div>
    </div>

    <script>
        let players = {}; let curT = 1; let seconds = 0; let timerInterval; let isPaused = false;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    let m = Math.floor(seconds / 60); let s = seconds % 60;
                    document.getElementById('game-timer').innerText = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
                }
            }, 1000);
        }

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('timer-icon').innerText = isPaused ? "▶️" : "⏸️";
            document.getElementById('header-area').classList.toggle('paused', isPaused);
        }

        function setMode(n) {
            players = {}; seconds = 0; isPaused = false; startTimer();
            const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) players[i] = { name: "یاریزان " + i, score: 0, history: [] };
            render();
        }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                let rem = 101 - players[i].score;
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" class="player-input" value="${players[i].name}" onchange="players[${i}].name=this.value">
                        <div class="score-total" onclick="openModal(${i})">${players[i].score}</div>
                        <div class="rem-pts">مەودا: ${rem}</div>
                        <div class="history-list">
                            ${players[i].history.map((pt, idx) => `<div class="history-item">${pt} <span onclick="deletePoint(${i}, ${idx})" style="color:red; margin-right:5px; cursor:pointer;">×</span></div>`).join("")}
                        </div>
                    </div>`;
            }
        }

        function validateScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (isNaN(v)) return;
            if (v >= 101) { 
                document.getElementById('illegal-text').innerText = v + " خاڵ نایاساییە!";
                document.getElementById('illegal-modal').style.display = 'flex'; 
                return; 
            }
            if (v >= 40) { 
                document.getElementById('confirm-box').style.display = 'block'; 
                document.getElementById('normal-btns').style.display = 'none'; 
            }
            else { saveScore(); }
        }

        function saveScore() {
            let v = parseInt(document.getElementById('points-input').value);
            players[curT].score += v; players[curT].history.push(v);
            render(); closeModal();
            if(players[curT].score >= 101) {
                confetti({ particleCount: 600, spread: 160, origin: { y: 0.6 }, colors: ['#efbf3b', '#39ff14', '#ffffff', '#ff0000'] });
                document.getElementById('winner-name').innerText = "👑 " + players[curT].name;
                document.getElementById('winner-stats').innerText = "نمرە: " + players[curT].score + " | کات: " + document.getElementById('game-timer').innerText;
                document.getElementById('win-modal').style.display = 'flex';
                saveToHistory(players[curT]);
            }
        }

        function saveToHistory(w) {
            let now = new Date();
            let dateKey = now.toLocaleDateString('ku-IQ');
            let history = JSON.parse(localStorage.getItem('domino_v10_hist') || '{}');
            if(!history[dateKey]) history[dateKey] = [];
            history[dateKey].unshift({ name: w.name, score: w.score, time: document.getElementById('game-timer').innerText });
            localStorage.setItem('domino_v10_hist', JSON.stringify(history));
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('domino_v10_hist') || '{}');
            let content = document.getElementById('history-content'); content.innerHTML = "";
            for (let date in history) {
                content.innerHTML += `<div style="background:var(--neon); color:#000; padding:10px; margin-top:10px; border-radius:10px; font-weight:900;">📅 ${date}</div>`;
                history[date].forEach(g => {
                    content.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px; display:flex; justify-content:space-between;"><span>👑 ${g.name}</span><span>${g.score} خاڵ | ${g.time}</span></div>`;
                });
            }
        }

        function deletePoint(p, h) { event.stopPropagation(); players[p].score -= players[p].history[h]; players[p].history.splice(h, 1); render(); }
        function openModal(t) { curT = t; document.getElementById('score-modal').style.display = 'flex'; document.getElementById('confirm-box').style.display = 'none'; document.getElementById('normal-btns').style.display = 'flex'; document.getElementById('points-input').value = ""; document.getElementById('points-input').focus(); }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }
        function openSettings() { loadHistory(); document.getElementById('settings-panel').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-panel').style.display = 'none'; }

        window.onload = () => setMode(2);
    </script>
</body>
</html>
