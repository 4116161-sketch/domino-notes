<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --bg: radial-gradient(circle, #400 0%, #000 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; }

        /* مێنۆی ڕێکخستن */
        #settings-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 8000; flex-direction: column; padding: 25px; overflow-y: auto;
        }
        .set-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .theme-dot { width: 35px; height: 35px; border-radius: 10px; border: 2px solid #fff; cursor: pointer; }

        /* UI سەرەکی */
        .top-nav { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.5); align-items: center; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex: 1; align-content: start; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 75%; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .card-header { background: rgba(255,255,255,0.1); padding: 10px; text-align: center; border-radius: 20px 20px 0 0; position: relative; }
        .p-name { color: #fff; font-weight: bold; font-size: 1rem; border: none; background: transparent; text-align: center; width: 100%; outline: none; }
        .score-total { font-size: 3rem; font-weight: 900; text-align: center; margin: 5px 0; }
        
        .history-list { height: 150px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .hist-item { display: flex; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.5rem; font-weight: bold; }

        /* پۆپ-ئەپی نمرە */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 88%; padding: 35px; border-radius: 25px; border: 2px solid var(--main); text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid var(--main); color: #fff; font-size: 5rem; text-align: center; outline: none; }

        .btn { background: var(--main); color: #000; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body id="app-body">

    <div id="settings-panel">
        <h2 style="color:var(--main); text-align:center; margin-bottom:20px;">⚙️ ڕێکخستنی دۆمینەزان</h2>
        
        <div class="set-card">
            <p>🎨 گۆڕینی ڕەنگ و ستایل</p>
            <div class="theme-grid">
                <div class="theme-dot" style="background:#800" onclick="changeTheme('#800', 'radial-gradient(circle, #500 0%, #000 100%)')"></div>
                <div class="theme-dot" style="background:#004" onclick="changeTheme('#004', 'radial-gradient(circle, #008 0%, #000 100%)')"></div>
                <div class="theme-dot" style="background:#efbf3b" onclick="changeTheme('#efbf3b', 'radial-gradient(circle, #440 0%, #000 100%)')"></div>
                <div class="theme-dot" style="background:#050" onclick="changeTheme('#050', 'radial-gradient(circle, #020 0%, #000 100%)')"></div>
                <div class="theme-dot" style="background:#404" onclick="changeTheme('#404', 'radial-gradient(circle, #202 0%, #000 100%)')"></div>
            </div>
        </div>

        <div class="set-card">
            <p>📱 سۆشیاڵ میدیا</p>
            <a href="https://tiktok.com/@awezapc" style="display:block; color:#fff; text-decoration:none; margin-top:10px;">🎵 تیکتۆکی ئاوێزە PC</a>
        </div>

        <button class="btn" onclick="document.getElementById('settings-panel').style.display='none'" style="width:100%; padding:15px;">داخستن</button>
    </div>

    <div class="top-nav">
        <div onclick="document.getElementById('settings-panel').style.display='flex'" style="font-size:1.8rem; cursor:pointer;">⚙️</div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" value="101" onchange="updateGoal()" style="background:#111; color:var(--main); border:1px solid var(--main); width:60px; text-align:center; border-radius:5px;"></div>
        <div>
            <button class="btn" onclick="setMode(2)" style="font-size:0.7rem; padding:5px 8px;">٢ نەفەری</button>
            <button class="btn" onclick="setMode(3)" style="font-size:0.7rem; padding:5px 8px; margin-right:5px;">٣ نەفەری</button>
        </div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            </form>
            <p id="error-msg" style="color:#f55; margin-top:10px; display:none; font-weight:bold;">⚠️ خاڵێکی نایاسایی</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" onclick="closeModal()" style="flex:1; background:#333; color:#fff;">لابردن</button>
                <button class="btn" onclick="addScore()" style="flex:1;">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size:5rem;">🏆</h1>
        <h2 id="winner-display" style="font-size:2.5rem; color:var(--main); margin:15px 0;">ناو</h2>
        <button class="btn" style="padding:15px 40px;">یاری نوێ 🔄</button>
    </div>

    <script>
        let curT = 0; let goal = 101; let players = {};

        function changeTheme(mainColor, bg) {
            document.documentElement.style.setProperty('--main', mainColor);
            document.getElementById('app-body').style.background = bg;
        }

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) { 
                let name = (n==2)?(i==1?"👨 تیمی یەکەم":"👨 تیمی دووەم"):(i==1?"👨 یەکەم":i==2?"👨 دووەم":"👨 سێیەم");
                players[i] = { name: name, s: 0, h: [] }; 
            }
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <span onclick="openModal(${i})" style="font-size:2.2rem; cursor:pointer; color:var(--main); font-weight:bold; display:block;">+</span>
                        </div>
                        <div class="score-total">${players[i].s} <span style="font-size:0.8rem; color:#444;">/${goal}</span></div>
                        <div class="history-list">${players[i].h.map((v, idx) => `<div class="hist-item"><span>${idx+1}</span><span>${v}</span><span onclick="delScore(${i},${idx})" style="color:#f55;">×</span></div>`).join('')}</div>
                    </div>`;
            }
        }

        function openModal(t) { 
            curT = t; 
            document.getElementById('modal-title').innerText = players[t].name; 
            document.getElementById('points-input').value = ""; 
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('score-modal').style.display = 'flex'; 
            document.getElementById('points-input').focus(); 
        }

        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }

        function addScore() {
            let v = parseInt(document.getElementById('points-input').value);
            
            // یاسای خاڵی نایاسایی (١٠١)
            if (v === 101) {
                document.getElementById('error-msg').style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(200);
                return;
            }

            if (!isNaN
