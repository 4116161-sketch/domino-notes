<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دۆمینەزان - ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --gold: #efbf3b; 
            --bg: #000000; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(239, 191, 59, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* بەشی سەرەوە */
        .header {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.6rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(239,191,59,0.5); }
        .folder-btn { background: var(--card-bg); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; }

        /* مۆدەکان */
        .modes { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .m-btn { background: transparent; color: #666; border: 1px solid #222; padding: 8px 20px; border-radius: 20px; transition: 0.3s; }
        .m-active { background: var(--gold); color: #000; border: none; font-weight: bold; box-shadow: 0 0 15px var(--gold); }

        /* کارتەکانی یاری */
        .grid { display: flex; gap: 12px; flex: 1; overflow-x: auto; padding: 10px 15px; align-items: stretch; }
        .card {
            min-width: 170px; flex: 1; background: var(--card-bg); border-radius: 30px;
            border: 1px solid var(--border); display: flex; flex-direction: column; 
            align-items: center; padding: 25px 10px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .p-name { 
            background: transparent; border: none; color: var(--gold); font-size: 1.2rem; 
            font-weight: bold; text-align: center; width: 90%; outline: none; border-bottom: 1px solid rgba(239,191,59,0.1);
        }
        .p-score { font-size: 5rem; font-weight: 900; margin: 10px 0; color: #fff; }
        
        /* مێژووی ناو کارتەکە */
        .hist-view { flex: 1; width: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .hist-num { background: rgba(255,255,255,0.03); padding: 5px; border-radius: 8px; text-align: center; color: #888; }

        /* دوگمەی پڵەس */
        .add-btn {
            background: var(--gold); color: #000; width: 70px; height: 70px; 
            border-radius: 22px; border: none; font-size: 2.5rem; font-weight: bold;
            box-shadow: 0 0 20px rgba(239,191,59,0.4);
        }

        /* کیبۆرد */
        .numpad {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #0a0a0a; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 25px; 
            z-index: 5000; border-top: 2px solid var(--gold); border-radius: 35px 35px 0 0;
        }
        .n-key { background: #1a1a1a; color: #fff; border: none; padding: 20px; font-size: 1.6rem; border-radius: 15px; font-weight: bold; }
        .n-ok { background: var(--gold) !important; color: #000 !important; grid-column: span 2; }

        /* ئەرشیف */
        #archive {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 6000; padding: 25px;
        }
        .arch-card { background: #111; border-radius: 20px; padding: 15px; margin-bottom: 15px; border-right: 5px solid var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">دۆمینەزان 💎</div>
        <button class="folder-btn" onclick="toggleArch()">📁 مێژوو</button>
    </div>

    <div class="modes">
        <button class="m-btn m-active" id="m2" onclick="setMode(2)">٢ نەفەری</button>
        <button class="m-btn" id="m3" onclick="setMode(3)">٣ نەفەری</button>
        <button class="m-btn" id="m4" onclick="setMode(4)">٤ نەفەری</button>
    </div>

    <div class="grid" id="main-grid">
        </div>

    <div style="padding: 15px; text-align: center;">
        <button onclick="location.reload()" style="background:none; border:none; color:#444; font-size:0.9rem;">🔄 دەستپێکردنەوەی یاری</button>
    </div>

    <div id="keypad" class="numpad">
        <button class="n-key" onclick="pk(1)">1</button><button class="n-key" onclick="pk(2)">2</button><button class="n-key" onclick="pk(3)">3</button>
        <button class="n-key" onclick="pk(4)">4</button><button class="n-key" onclick="pk(5)">5</button><button class="n-key" onclick="pk(6)">6</button>
        <button class="n-key" onclick="pk(7)">7</button><button class="n-key" onclick="pk(8)">8</button><button class="n-key" onclick="pk(9)">9</button>
        <button class="n-key" style="background:#333" onclick="ck()">✖</button><button class="n-key" onclick="pk(0)">0</button><button class="n-key n-ok" onclick="dk()">تەواو ✅</button>
    </div>

    <div id="archive">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="color:var(--gold)">📂 ئەرشیفی یارییەکان</h2>
            <button onclick="toggleArch()" style="background:var(--gold); border:none; padding:8px 20px; border-radius:10px; font-weight:bold;">داخستن</button>
        </div>
        <div id="arch-list" style="overflow-y:auto; max-height:80vh;"></div>
    </div>

    <script>
        let curT = 0; let curI = "";
        let data = { 1: {s:0, h:[]}, 2: {s:0, h:[]}, 3: {s:0, h:[]}, 4: {s:0, h:[]} };

        function setMode(n) {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('m-active'));
            document.getElementById('m'+n).classList.add('m-active');
            const g = document.getElementById('main-grid');
            g.innerHTML = "";
            for(let i=1; i<=n; i++) {
                g.innerHTML += `
                    <div class="card">
                        <input type="text" class="p-name" id="n${i}" value="تیمی ${i}">
                        <div class="p-score" id="s${i}">${data[i].s}</div>
                        <div class="hist-view" id="h${i}">${data[i].h.map(x=>`<div class="hist-num">${x}</div>`).join('')}</div>
                        <button class="add-btn" onclick="openK(${i})">+</button>
                    </div>`;
            }
        }

        function openK(t) { curT = t; curI = ""; document.getElementById('keypad').style.display = 'grid'; }
        function pk(n) { curI += n; }
        function ck() { document.getElementById('keypad').style.display = 'none'; }

        function dk() {
            let v = parseInt(curI) || 0;
            if(v > 0) {
                data[curT].s += v;
                data[curT].h.push(v);
                document.getElementById('s'+curT).innerText = data[curT].s;
                document.getElementById('h'+curT).innerHTML = data[curT].h.map(x=>`<div class="hist-num">${x}</div>`).join('');
                if(data[curT].s >= 101) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    let name = document.getElementById('n'+curT).value;
                    saveToLog(name);
                    setTimeout(() => { alert("🏆 پیرۆزە! " + name + " بردییەوە"); location.reload(); }, 500);
                }
            }
            ck();
        }

        function saveToLog(w) {
            let logs = JSON.parse(localStorage.getItem('dz_logs') || '[]');
            logs.unshift({ date: new Date().toLocaleString('ku-IQ'), win: w });
            localStorage.setItem('dz_logs', JSON.stringify(logs));
        }

        function toggleArch() {
            const p = document.getElementById('archive');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            if(p.style.display === 'block') {
                let logs = JSON.parse(localStorage.getItem('dz_logs') || '[]');
                document.getElementById('arch-list').innerHTML = logs.map(l => `
                    <div class="arch-card">
                        <div style="color:#666; font-size:0.8rem;">📅 ${l.date}</div>
                        <div style="color:var(--gold); font-weight:bold; margin-top:5px;">🏆 براوە: ${l.win}</div>
                    </div>`).join('');
            }
        }

        setMode(2);
    </script>
</body>
</html>
