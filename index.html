<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری ئاوێزە - Archive Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #fdd835; --bg: #0a0a0a; --card: #161616; --blue: #1877f2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg); color: #fff; font-family: sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* سەرەتا و مێنۆ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #111; border-bottom: 1px solid #222; }
        .logo { color: var(--gold); font-weight: bold; font-size: 1.3rem; }
        .settings-icon { font-size: 1.5rem; cursor: pointer; background: none; border: none; color: white; }

        /* کارتەکانی یاری */
        .game-area { display: flex; gap: 10px; flex: 1; overflow-x: auto; padding: 15px; align-items: stretch; }
        .team-box {
            min-width: 160px; flex: 1; background: var(--card); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; padding: 20px 10px; border: 1px solid #222;
        }
        .score { font-size: 4rem; font-weight: 900; margin: 10px 0; color: #fff; }
        .history-mini { flex: 1; width: 100%; overflow-y: auto; font-size: 0.8rem; color: #666; text-align: center; }

        /* بەشی ڕێکخستنەکان و فۆڵدەری مێژوو */
        #settings-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; padding: 20px; overflow-y: auto;
        }
        .folder-box {
            background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border-right: 5px solid var(--gold); /* شێوەی فۆڵدەر */
        }
        .folder-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }

        /* کیبۆرد و دوگمەکان */
        .numpad {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #111;
            grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 15px; border-top: 2px solid var(--gold); z-index: 3000;
        }
        .numpad button { background: #222; color: #fff; border: none; padding: 18px; font-size: 1.5rem; border-radius: 10px; }
        
        .add-btn { background: var(--gold); color: #000; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 2rem; font-weight: bold; }
        .win-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">ئاوێزە PC 🀄</div>
        <button class="settings-icon" onclick="toggleSettings()">📁 مێژوو</button>
    </div>

    <div class="game-area" id="game-container">
        <div class="team-box">
            <input type="text" id="tn1" value="تیمی ١" style="background:none; border:none; color:var(--gold); text-align:center; font-size:1.2rem; font-weight:bold; outline:none;">
            <div class="score" id="s1">0</div>
            <div class="history-mini" id="h1"></div>
            <button class="add-btn" onclick="openKeypad(1)">+</button>
        </div>
        <div class="team-box">
            <input type="text" id="tn2" value="تیمی ٢" style="background:none; border:none; color:var(--gold); text-align:center; font-size:1.2rem; font-weight:bold; outline:none;">
            <div class="score" id="s2">0</div>
            <div class="history-mini" id="h2"></div>
            <button class="add-btn" onclick="openKeypad(2)">+</button>
        </div>
    </div>

    <div id="settings-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold)">📂 فۆڵدەری مێژووی یارییەکان</h2>
            <button onclick="toggleSettings()" style="background:var(--gold); border:none; padding:5px 15px; border-radius:10px; font-weight:bold;">داخستن ×</button>
        </div>
        <div id="archive-list">
            <p style="color:#666; text-align:center;">هیچ یارییەک لە فۆڵدەردا نییە</p>
        </div>
        <button onclick="clearArchive()" style="width:100%; margin-top:20px; background:#ff5252; color:white; border:none; padding:10px; border-radius:10px;">سڕینەوەی هەموو فۆڵدەرەکان 🗑️</button>
    </div>

    <div id="keypad" class="numpad">
        <button onclick="addNum(1)">1</button><button onclick="addNum(2)">2</button><button onclick="addNum(3)">3</button>
        <button onclick="addNum(4)">4</button><button onclick="addNum(5)">5</button><button onclick="addNum(6)">6</button>
        <button onclick="addNum(7)">7</button><button onclick="addNum(8)">8</button><button onclick="addNum(9)">9</button>
        <button style="background:#444" onclick="closeKeypad()">داخستن</button><button onclick="addNum(0)">0</button><button style="background:var(--gold); color:black;" onclick="savePoints()">تەواو ✅</button>
    </div>

    <div id="win-screen" class="win-overlay" onclick="saveToArchive(); location.reload();">
        <h1 style="color:var(--gold); font-size:4rem;">🏆</h1>
        <h2 id="win-name" style="color:white"></h2>
        <p style="color:#888;">بۆ پاشەکەوتکردن لە فۆڵدەر دەست لێرە بدە</p>
    </div>

    <script>
        let currentT = 0; let inputStr = "";
        let gameData = { 1: {s:0, h:[]}, 2: {s:0, h:[]} };

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            loadArchive();
        }

        function openKeypad(t) { currentT = t; inputStr = ""; document.getElementById('keypad').style.display = 'grid'; }
        function addNum(n) { inputStr += n; }
        function closeKeypad() { document.getElementById('keypad').style.display = 'none'; }

        function savePoints() {
            let val = parseInt(inputStr) || 0;
            if(val > 0) {
                gameData[currentT].s += val;
                gameData[currentT].h.push(val);
                document.getElementById('s'+currentT).innerText = gameData[currentT].s;
                document.getElementById('h'+currentT).innerHTML = gameData[currentT].h.map(x => `<div>${x}</div>`).join('');
                if(gameData[currentT].s >= 101) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    document.getElementById('win-name').innerText = document.getElementById('tn'+currentT).value + " بردییەوە!";
                    document.getElementById('win-screen').style.display = 'flex';
                }
            }
            closeKeypad();
        }

        // پاشەکەوتکردن وەک فۆڵدەر لە ناو مێژوو
        function saveToArchive() {
            let history = JSON.parse(localStorage.getItem('aweza_archive') || '[]');
            let newGame = {
                date: new Date().toLocaleString('ku-IQ'),
                team1: document.getElementById('tn1').value + ": " + gameData[1].s,
                team2: document.getElementById('tn2').value + ": " + gameData[2].s,
                winner: document.getElementById('win-name').innerText
            };
            history.unshift(newGame);
            localStorage.setItem('aweza_archive', JSON.stringify(history));
        }

        function loadArchive() {
            let history = JSON.parse(localStorage.getItem('aweza_archive') || '[]');
            const list = document.getElementById('archive-list');
            if(history.length === 0) return;
            list.innerHTML = history.map(g => `
                <div class="folder-box">
                    <div class="folder-title"><span>📅 ${g.date}</span></div>
                    <div style="font-size:0.9rem;">${g.team1} <br> ${g.team2}</div>
                    <div style="color:var(--gold); margin-top:5px; font-weight:bold;">🏆 ${g.winner}</div>
                </div>
            `).join('');
        }

        function clearArchive() {
            if(confirm("دڵنیای هەموو فۆڵدەرەکانی مێژوو بسڕدرێتەوە؟")) {
                localStorage.removeItem('aweza_archive');
                loadArchive();
                document.getElementById('archive-list').innerHTML = '<p style="color:#666; text-align:center;">فۆڵدەرەکە سڕایەوە</p>';
            }
        }
    </script>
</body>
</html>
