<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>دۆمینەزان Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #efbf3b; --card-bg: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* ستایلەکان */
        body.theme-1 { background: url('https://www.transparenttextures.com/patterns/papyrus.png'), #bca88e; } /* ستایلی کاغەزی */
        body.theme-2 { background: radial-gradient(circle, #ff0000 0%, #000000 100%); } /* ستایلی سوور و ڕەش */
        body.theme-3 { background: #1a1a1a; } /* ستایلی دۆمینە سپی */
        body.theme-4 { background: #000; } /* ستایلی پەرداخ و دۆمینە */

        body { color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; }

        .top-nav { display: flex; justify-content: space-between; padding: 15px; align-items: center; background: rgba(0,0,0,0.3); }
        .settings-btn { font-size: 1.5rem; cursor: pointer; }

        /* بەشی گۆڕینی ستایل */
        .theme-selector {
            display: none; position: absolute; top: 60px; left: 10px; 
            background: #222; padding: 10px; border-radius: 10px; z-index: 1000;
        }
        .theme-opt { width: 30px; height: 30px; border-radius: 50%; display: inline-block; margin: 5px; border: 2px solid #fff; }

        /* دیزاینی کارتەکان ڕێک وەک وێنەکە */
        .game-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            padding: 20px; flex: 1; align-content: center;
        }
        .card {
            background: rgba(255,255,255,0.15); border-radius: 15px;
            padding: 10px; text-align: center; position: relative;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
        .p-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .p-score { font-size: 3rem; font-weight: 900; }
        .limit-txt { font-size: 0.7rem; color: #ccc; vertical-align: middle; }
        
        .add-area {
            background: rgba(255,255,255,0.2); border-radius: 10px;
            margin-top: 10px; padding: 5px; cursor: pointer;
        }
        .plus-icon { font-size: 1.5rem; font-weight: bold; }

        /* کیبۆرد و دوگمەکان */
        .numpad {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #111; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 15px; 
            z-index: 2000; border-top: 2px solid var(--gold); border-radius: 20px 20px 0 0;
        }
        .n-key { background: #333; color: #fff; border: none; padding: 15px; font-size: 1.4rem; border-radius: 10px; }
        
        .bottom-btns { display: flex; justify-content: space-around; padding: 20px; }
        .btn-action { background: #ff0000; color: #fff; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body class="theme-1" id="main-body">

    <div class="top-nav">
        <div class="settings-btn" onclick="document.getElementById('theme-menu').style.display='block'">⚙️</div>
        <div style="background:#000; padding:2px 10px; border-radius:5px;">200 ></div>
        <div style="background:#000; padding:2px 10px; border-radius:5px;">👥 4</div>
    </div>

    <div class="theme-selector" id="theme-menu" onclick="this.style.display='none'">
        <div class="theme-opt" style="background:#bca88e" onclick="changeTheme('theme-1')"></div>
        <div class="theme-opt" style="background:red" onclick="changeTheme('theme-2')"></div>
        <div class="theme-opt" style="background:#444" onclick="changeTheme('theme-3')"></div>
        <div class="theme-opt" style="background:#000" onclick="changeTheme('theme-4')"></div>
    </div>

    <div class="game-grid">
        <div class="card">
            <span class="p-name">home</span>
            <div class="p-score" id="s1">0 <span class="limit-txt">/200</span></div>
            <div class="add-area" onclick="openK(1)">
                <div class="plus-icon">+</div>
            </div>
        </div>
        <div class="card">
            <span class="p-name">visitor</span>
            <div class="p-score" id="s2">0 <span class="limit-txt">/200</span></div>
            <div class="add-area" onclick="openK(2)">
                <div class="plus-icon">+</div>
            </div>
        </div>
        <div class="card">
            <span class="p-name">visitor1</span>
            <div class="p-score" id="s3">0 <span class="limit-txt">/200</span></div>
            <div class="add-area" onclick="openK(3)">
                <div class="plus-icon">+</div>
            </div>
        </div>
        <div class="card">
            <span class="p-name">visitor2</span>
            <div class="p-score" id="s4">0 <span class="limit-txt">/200</span></div>
            <div class="add-area" onclick="openK(4)">
                <div class="plus-icon">+</div>
            </div>
        </div>
    </div>

    <div class="bottom-btns">
        <div style="font-size:1.5rem;">🕒</div>
        <button class="btn-action" onclick="location.reload()">RESTART</button>
        <button style="background:#fff; color:#000; border:none; padding:5px 15px; border-radius:8px; font-weight:bold;">Premium</button>
    </div>

    <div id="keypad" class="numpad">
        <button class="n-key" onclick="pk(1)">1</button><button class="n-key" onclick="pk(2)">2</button><button class="n-key" onclick="pk(3)">3</button>
        <button class="n-key" onclick="pk(4)">4</button><button class="n-key" onclick="pk(5)">5</button><button class="n-key" onclick="pk(6)">6</button>
        <button class="n-key" onclick="pk(7)">7</button><button class="n-key" onclick="pk(8)">8</button><button class="n-key" onclick="pk(9)">9</button>
        <button class="n-key" style="background:#555" onclick="ck()">✖</button><button class="n-key" onclick="pk(0)">0</button><button class="n-key" style="background:green" onclick="dk()">✅</button>
    </div>

    <script>
        let curT = 0; let curI = "";
        let data = { 1: 0, 2: 0, 3: 0, 4: 0 };

        function changeTheme(cls) {
            document.getElementById('main-body').className = cls;
        }

        function openK(t) { curT = t; curI = ""; document.getElementById('keypad').style.display = 'grid'; }
        function pk(n) { curI += n; }
        function ck() { document.getElementById('keypad').style.display = 'none'; }

        function dk() {
            let v = parseInt(curI) || 0;
            if(v > 0) {
                data[curT] += v;
                document.getElementById('s'+curT).innerHTML = data[curT] + ' <span class="limit-txt">/200</span>';
                if(data[curT] >= 200) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    alert("🏆 پیرۆزە!");
                }
            }
            ck();
        }
    </script>
</body>
</html>
