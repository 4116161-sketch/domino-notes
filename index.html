<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری ئاوێزە PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            background-image: url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--main); z-index: 10; }
        .logo-text { color: var(--main); font-size: 1.5rem; font-weight: 900; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 85%; margin: 0 auto; }
        
        .card { 
            background: rgba(255, 255, 255, 0.12); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 15px; text-align: center; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
        }

        .player-input { background: none; border: none; color: #fff; text-align: center; width: 100%; font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; outline: none; }
        .score-total { font-size: 3.5rem; font-weight: 900; color: var(--main); cursor: pointer; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* لیستی خاڵە تۆمارکراوەکان */
        .history-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-height: 100px; overflow-y: auto; padding: 5px; }
        .history-item { background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .del-btn { color: var(--red); font-weight: bold; cursor: pointer; padding: 0 2px; }

        /* مۆداڵەکان */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 90%; max-width: 350px; padding: 25px; border-radius: 25px; border: 2px solid var(--main); text-align: center; }
        .num-input { width: 100%; font-size: 4rem; background: none; border: none; border-bottom: 3px solid var(--main); color: var(--main); text-align: center; outline: none; margin-bottom: 20px; }
        
        /* دیزاینی ئاگاداری نایاسایی */
        #illegal-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.2); backdrop-filter: blur(10px); z-index: 20000; align-items: center; justify-content: center; text-align: center; }
        .alert-card { background: #000; border: 4px solid var(--red); padding: 30px; border-radius: 30px; width: 85%; box-shadow: 0 0 50px var(--red); }

        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-main { background: var(--main); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">AWEZA PC</div>
        <div onclick="document.getElementById('settings-panel').style.display='flex'" style="font-size:1.6rem; cursor:pointer;">⚙️</div>
    </div>

    <div style="display:flex; justify-content:center; gap:10px; padding:10px;">
        <button id="btn2" class="mode-btn" onclick="setMode(2)" style="background:none; border:1px solid var(--main); color:#fff; padding:5px 15px; border-radius:10px;">٢ نەفەری</button>
        <button id="btn3" class="mode-btn" onclick="setMode(3)" style="background:none; border:1px solid var(--main); color:#fff; padding:5px 15px; border-radius:10px;">٣ نەفەری</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="illegal-alert">
        <div class="alert-card">
            <h1 style="color:var(--red); font-size:4rem;">⛔</h1>
            <h2 style="color:#fff; margin:15px 0;">خاڵێکی نایاساییە!</h2>
            <p style="color:#ddd;">نمرەی (١٠١) و سەرووتر لە یاسای ئاوێزە PC ڕێگەپێنەدراوە.</p>
            <button class="btn btn-red" style="margin-top:20px;" onclick="closeIllegal()">تێگەیشتم</button>
        </div>
    </div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">تۆمارکردن</h2>
            <input type="number" id="points-input" class="num-input" placeholder="0" inputmode="numeric">
            
            <div id="confirm-box" style="display:none;">
                <p style="color:var(--main); margin-bottom:15px;">⚠️ ئەم خاڵە زۆرە، ئایا دڵنیایت؟</p>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-green" onclick="saveScore(true)">بەڵێ</button>
                    <button class="btn btn-red" onclick="closeModal()">نەخێر</button>
                </div>
            </div>

            <div id="normal-btns" style="display:flex; gap:10px;">
                <button class="btn btn-red" onclick="closeModal()">لابردن</button>
                <button class="btn btn-main" onclick="validateScore()">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <div id="win-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:30000; align-items:center; justify-content:center; flex-direction:column; text-align:center;" onclick="location.reload()">
        <h1 style="color:var(--main); font-size:3rem;">👑 پیرۆزە</h1>
        <h2 id="win-name" style="color:#fff; margin:10px 0;"></h2>
        <button class="btn btn-main" style="width:200px;">یاری نوێ</button>
    </div>

    <script>
        let players = {}; let curT = 1;

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) players[i] = { name: "یاریزان " + i, score: 0, history: [] };
            render();
        }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                let hHtml = players[i].history.map((pt, index) => `
                    <div class="history-item">${pt} <span class="del-btn" onclick="deletePoint(${i}, ${index})">×</span></div>
                `).join("");

                grid.innerHTML += `
                    <div class="card">
                        <input type="text" class="player-input" value="${players[i].name}" onfocus="this.value=''" onchange="players[${i}].name=this.value">
                        <div class="score-total" onclick="openModal(${i})">${players[i].score}</div>
                        <div class="history-list">${hHtml}</div>
                    </div>`;
            }
        }

        function openModal(t) {
            curT = t; document.getElementById('modal-title').innerText = players[t].name;
            document.getElementById('score-modal').style.display = 'flex';
            document.getElementById('points-input').value = ""; document.getElementById('points-input').focus();
            document.getElementById('confirm-box').style.display = 'none';
            document.getElementById('normal-btns').style.display = 'flex';
        }

        function validateScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (isNaN(v)) return;
            if (v >= 101) {
                document.getElementById('illegal-alert').style.display = 'flex';
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                return;
            }
            if (v >= 50 && v <= 100) {
                document.getElementById('confirm-box').style.display = 'block';
                document.getElementById('normal-btns').style.display = 'none';
            } else { saveScore(); }
        }

        function saveScore() {
            let v = parseInt(document.getElementById('points-input').value);
            players[curT].score += v;
            players[curT].history.push(v);
            render(); closeModal();
            if(players[curT].score >= 101) {
                confetti(); document.getElementById('win-name').innerText = players[curT].name;
                document.getElementById('win-overlay').style.display = 'flex';
            }
        }

        function deletePoint(pIdx, hIdx) {
            event.stopPropagation();
            players[pIdx].score -= players[pIdx].history[hIdx];
            players[pIdx].history.splice(hIdx, 1);
            render();
        }

        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }
        function closeIllegal() { document.getElementById('illegal-alert').style.display = 'none'; }
        
        window.onload = () => setMode(2);
    </script>
</body>
</html>
