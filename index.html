<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵژمێری دۆمینە - Aweza PC</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* پاشبنەمای ڤیدیۆیی */
        #video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: blur(4px) brightness(0.3); }

        /* لۆگۆ */
        .header { text-align: center; padding: 15px 10px; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--main); text-shadow: 0 0 20px rgba(239,191,59,0.5); letter-spacing: 2px; }

        /* ڕێکخستن و تایمەر */
        .nav-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer-box { display: flex; align-items: center; gap: 8px; background: #000; padding: 5px 12px; border-radius: 10px; border: 1px solid #444; }
        #game-timer { font-family: monospace; color: var(--main); font-weight: bold; font-size: 1.1rem; }
        .paused { color: var(--red) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* کارتەکان */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 85%; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.08); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding-bottom: 10px; }
        .card-header { background: rgba(255,255,255,0.1); padding: 10px; text-align: center; border-radius: 20px 20px 0 0; }
        .p-name { background: transparent; border: none; color: #fff; font-weight: bold; text-align: center; width: 100%; outline: none; font-size: 1rem; }
        .score-total { font-size: 3.2rem; font-weight: 900; text-align: center; margin: 5px 0; }
        .history-list { height: 130px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.05); }
        .hist-item { display: flex; justify-content: space-between; padding: 8px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 1.4rem; font-weight: bold; }

        /* دوگمەکان */
        .plus-btn { font-size: 2.5rem; color: var(--main); cursor: pointer; font-weight: bold; }
        .mode-btn { background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .active-mode { background: var(--main); color: #000; border: none; }

        /* پۆپ-ئەپ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; padding: 30px; border-radius: 25px; border: 2px solid var(--main); text-align: center; }
        .modal-input { width: 100%; background: transparent; border: none; border-bottom: 4px solid var(--main); color: #fff; font-size: 5rem; text-align: center; outline: none; margin: 20px 0; }

        #win-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body id="app-body">

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-fire-flames-flicker-in-the-dark-4428-large.mp4" type="video/mp4">
    </video>

    <div class="header">
        <div class="logo">AWEZA PC</div>
    </div>

    <div class="nav-bar">
        <div style="display:flex; gap:5px;">
            <button id="m2" class="mode-btn active-mode" onclick="setMode(2)">٢ نەفەری</button>
            <button id="m3" class="mode-btn" onclick="setMode(3)">٣ نەفەری</button>
        </div>
        <div class="timer-box">
            <span id="game-timer">00:00</span>
            <span id="pause-btn" onclick="toggleTimer()" style="cursor:pointer; margin-right:5px;">⏸️</span>
        </div>
        <div style="font-weight:bold;">ئامانج: <input type="number" id="goal-val" value="101" onchange="updateGoal()" style="background:#000; color:var(--main); border:1px solid #333; width:45px; text-align:center; border-radius:5px;"></div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">ناو</h2>
            <form onsubmit="event.preventDefault(); addScore();">
                <input type="number" id="points-input" class="modal-input" placeholder="0" inputmode="numeric">
            </form>
            <p id="err-msg" style="color:var(--red); display:none; font-weight:bold; margin-top:10px;">⚠️ خاڵێکی نایاسایی (١٠١)</p>
        </div>
    </div>

    <div id="win-overlay" onclick="location.reload()">
        <h1 style="font-size:5rem;">🏆</h1>
        <h2 id="winner-display" style="font-size:2.5rem; color:var(--main); margin:15px 0;">ناو</h2>
        <button style="background:var(--main); padding:15px 40px; border-radius:15px; border:none; font-weight:bold;">یاری نوێ 🔄</button>
    </div>

    <script>
        let curT = 0, goal = 101, players = {}, seconds = 0, timerInterval, isPaused = false;

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "▶️" : "⏸️";
            document.getElementById('game-timer').classList.toggle('paused', isPaused);
        }

        function setMode(n) {
            players = {}; const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            document.getElementById('m2').classList.toggle('active-mode', n==2);
            document.getElementById('m3').classList.toggle('active-mode', n==3);
            for(let i=1; i<=n; i++) { 
                let name = (n==2)?(i==1?"👨 تیمی ١":"👨 تیمی ٢"):(i==1?"👨 یەکەم":i==2?"👨 دووەم":"👨 سێیەم");
                players[i] = { name: name, s: 0, h: [] }; 
            }
            renderAll(); startTimer();
        }

        function renderAll() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                grid.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <input type="text" class="p-name" value="${players[i].name}" onclick="this.value=''" onchange="players[${i}].name=this.value">
                            <span onclick="openModal(${i})" class="plus-btn">+</span>
                        </div>
                        <div class="score-total">${players[i].s}</div>
                        <div class="history-list">${players[i].h.map((v, idx) => `<div class="hist-item"><span style="color:#444">${idx+1}</span><span>${v}</span><span onclick="delScore(${i},${idx})" style="color:var(--red)">×</span></div>`).join('')}</div>
                    </div>`;
            }
        }

        function openModal(t) { 
            curT = t; document.getElementById('modal-title').innerText = players[t].name; 
            document.getElementById('points-input').value = ""; document.getElementById('err-msg').style.display = 'none';
            document.getElementById('score-modal').style.display = 'flex'; document.getElementById('points-input').focus(); 
        }

        function addScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (v === 101) { document.getElementById('err-msg').style.display = 'block'; return; }
            if (!isNaN(v) && v !== 0) {
                players[curT].s += v; players[curT].h.push(v); renderAll();
                if(players[curT].s >= goal) {
                    confetti({ particleCount: 300, spread: 80, origin: { y: 0.6 } });
                    document.getElementById('winner-display').innerText = players[curT].name;
                    document.getElementById('win-overlay').style.display = 'flex';
                }
            }
            document.getElementById('score-modal').style.display = 'none';
        }

        function startTimer() { if(timerInterval) return; timerInterval = setInterval(() => { if(!isPaused) { seconds++; let m = Math.floor(seconds/60).toString().padStart(2,'0'); let s = (seconds%60).toString().padStart(2,'0'); document.getElementById('game-timer').innerText = `${m}:${s}`; } }, 1000); }
        function delScore(t, idx) { players[t].s -= players[t].h[idx]; players[t].h.splice(idx, 1); renderAll(); }
        function updateGoal() { goal = document.getElementById('goal-val').value; renderAll(); }

        setMode(2);
    </script>
</body>
</html>
