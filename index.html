<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>خاڵ ژمێری دۆمینە</title>
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #efbf3b; --red: #ff4444; --green: #00ff88; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: #000;
            background-image: url('https://w0.peakpx.com/wallpaper/744/807/HD-wallpaper-dominos-reflection-dominos.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.85); border-bottom: 2px solid var(--main); z-index: 100; }
        .logo-text { color: var(--main); font-size: 1.3rem; font-weight: 900; }

        /* کاتژمێری ڕاگیراو و پرتەپرت */
        #game-timer { font-family: monospace; font-size: 1.4rem; color: var(--green); cursor: pointer; padding: 2px 10px; border-radius: 8px; transition: 0.3s; }
        #game-timer.paused { color: var(--red); animation: blinker 1s linear infinite; background: rgba(255,0,0,0.1); }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; flex: 1; align-content: start; overflow-y: auto; }
        .grid-3 .card:nth-child(3) { grid-column: span 2; width: 85%; margin: 0 auto; }
        
        .card { 
            background: rgba(255, 255, 255, 0.12); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 15px; text-align: center; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            margin-bottom: 5px;
        }

        .player-input { background: none; border: none; color: #fff; text-align: center; width: 100%; font-weight: bold; font-size: 1.1rem; outline: none; }
        .score-total { font-size: 3.8rem; font-weight: 900; color: var(--main); cursor: pointer; line-height: 1.1; margin: 5px 0; }
        .rem-pts { font-size: 0.8rem; color: var(--main); font-weight: bold; margin-bottom: 10px; opacity: 0.9; }

        .history-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-height: 100px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .history-item { background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #111; width: 100%; max-width: 360px; padding: 25px; border-radius: 30px; border: 2px solid var(--main); text-align: center; }

        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-main { background: var(--main); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="document.getElementById('settings-panel').style.display='flex'" style="font-size:1.6rem; cursor:pointer;">⚙️</div>
        <div id="game-timer" onclick="toggleTimer()">00:00</div>
        <div class="logo-text">AWEZA PC</div>
    </div>

    <div style="display:flex; justify-content:center; gap:8px; padding:10px;">
        <button onclick="setMode(2)" style="background:none; border:1px solid var(--main); color:#fff; padding:5px 15px; border-radius:10px; font-weight:bold;">٢ نەفەری</button>
        <button onclick="setMode(3)" style="background:none; border:1px solid var(--main); color:#fff; padding:5px 15px; border-radius:10px; font-weight:bold;">٣ نەفەری</button>
    </div>

    <div id="main-grid" class="game-grid"></div>

    <div id="score-modal" class="modal">
        <div class="modal-box">
            <h2 id="modal-title" style="color:var(--main);">تۆمارکردن</h2>
            <input type="number" id="points-input" style="width:100%; font-size:4rem; background:none; border:none; border-bottom:4px solid var(--main); color:var(--main); text-align:center; outline:none; margin:20px 0;" placeholder="0" inputmode="numeric">
            <div id="confirm-box" style="display:none; margin-bottom:20px;">
                <p style="color:var(--main); font-weight:bold;">⚠️ ئایا دڵنیایت لەم خاڵە؟</p>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn" style="background:var(--green);" onclick="saveScore()">بەڵێ</button>
                    <button class="btn btn-red" onclick="closeModal()">نەخێر</button>
                </div>
            </div>
            <div id="normal-btns" style="display:flex; gap:10px;">
                <button class="btn btn-red" onclick="closeModal()">لابردن</button>
                <button class="btn btn-main" onclick="validateScore()">تۆمارکردن</button>
            </div>
        </div>
    </div>

    <div id="settings-panel" class="modal" style="flex-direction:column; justify-content:center;">
        <div class="modal-box">
            <h2 style="color:var(--main); margin-bottom:20px;">ڕێکخستنی ئاوێزە</h2>
            <p style="color:#aaa; margin-bottom:20px;">تۆمارکردنەکان و باکگراوند بە ئۆفلاین پاشەکەوت دەبن.</p>
            <button class="btn btn-red" onclick="document.getElementById('settings-panel').style.display='none'">گەڕانەوە</button>
        </div>
    </div>

    <script>
        let players = {}; let curT = 1; let seconds = 0; let timerInterval; let isPaused = false;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    document.getElementById('game-timer').innerText = 
                        (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
                }
            }, 1000);
        }

        function toggleTimer() {
            isPaused = !isPaused;
            document.getElementById('game-timer').classList.toggle('paused', isPaused);
        }

        function setMode(n) {
            players = {}; seconds = 0; isPaused = false;
            document.getElementById('game-timer').classList.remove('paused');
            startTimer();
            const grid = document.getElementById('main-grid');
            grid.className = (n === 3 ? 'game-grid grid-3' : 'game-grid');
            for(let i=1; i<=n; i++) players[i] = { name: "یاریزان " + i, score: 0, history: [] };
            render();
        }

        function render() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = "";
            for (let i in players) {
                let rem = 101 - players[i].score;
                let hHtml = players[i].history.map((pt, idx) => `<div class="history-item">${pt} <span style="color:red; font-weight:bold;" onclick="deletePoint(${i}, ${idx})">×</span></div>`).join("");
                grid.innerHTML += `
                    <div class="card">
                        <input type="text" class="player-input" value="${players[i].name}" onfocus="this.value=''" onchange="players[${i}].name=this.value">
                        <div class="score-total" onclick="openModal(${i})">${players[i].score}</div>
                        <div class="rem-pts">${rem} خاڵ ماوە بۆ بردنەوە</div>
                        <div class="history-list">${hHtml}</div>
                    </div>`;
            }
        }

        function openModal(t) {
            curT = t; document.getElementById('score-modal').style.display = 'flex';
            document.getElementById('points-input').value = ""; document.getElementById('points-input').focus();
            document.getElementById('confirm-box').style.display = 'none';
            document.getElementById('normal-btns').style.display = 'flex';
        }

        function validateScore() {
            let v = parseInt(document.getElementById('points-input').value);
            if (v >= 101) { alert("⛔ خاڵێکی نایاساییە (١٠١ و سەرووتر)!"); return; }
            if (v >= 50) {
                document.getElementById('confirm-box').style.display = 'block';
                document.getElementById('normal-btns').style.display = 'none';
            } else { saveScore(); }
        }

        function saveScore() {
            let v = parseInt(document.getElementById('points-input').value);
            players[curT].score += v;
            players[curT].history.push(v);
            render(); closeModal();
            if(players[curT].score >= 101) {
                confetti();
                let time = document.getElementById('game-timer').innerText;
                alert("🏆 پیرۆزە " + players[curT].name + " بردییەوە!\n⏰ کاتی یاری: " + time);
                setMode(Object.keys(players).length);
            }
        }

        function deletePoint(p, h) { event.stopPropagation(); players[p].score -= players[p].history[h]; players[p].history.splice(h, 1); render(); }
        function closeModal() { document.getElementById('score-modal').style.display = 'none'; }
        
        window.onload = () => setMode(2);
    </script>
</body>
</html>
